# Workspace-level pre-commit config.
#
# The workspace repo holds cross-repo scripts + docs + the
# `docs/openapi.json` snapshot. It can't accidentally commit the inner
# repos' env files (those are gitignored downstream), but workspace-level
# docs occasionally paste real-looking keys as examples. This config
# runs the same secret-prefix guard the sub-repos use.
#
# Install once (both hook types — the flag-registry check below runs at
# pre-push, not on every commit):
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# Manual whole-tree scan:
#   scripts/check-secret-prefixes.sh --all
#   python3 scripts/check_flag_registry.py

repos:
  - repo: local
    hooks:
      - id: check-secret-prefixes
        name: Check for live-key prefixes (Anthropic, Clerk, Google, …)
        entry: scripts/check-secret-prefixes.sh
        language: system
        pass_filenames: true
        files: \.(env|env\..*|md|yml|yaml|ts|tsx|py|sh|json|txt)$
        exclude: 'node_modules/|\.venv/|\.git/'

      - id: check-flag-registry
        name: Check no feature flag is past its review/removal date
        entry: python3 scripts/check_flag_registry.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-doc-governance
        name: Check new docs carry lifecycle metadata
        entry: python3 scripts/check_doc_governance.py --staged-new
        language: system
        pass_filenames: false
        always_run: true
