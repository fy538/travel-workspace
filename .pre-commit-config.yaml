# Workspace-level pre-commit config.
#
# The workspace repo holds cross-repo scripts + docs + the
# `docs/openapi.json` snapshot. It can't accidentally commit the inner
# repos' env files (those are gitignored downstream), but workspace-level
# docs occasionally paste real-looking keys as examples. This config
# runs the same secret-prefix guard the sub-repos use.
#
# Install once (both hook types — the flag-registry check below runs at
# pre-push, not on every commit):
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# Manual whole-tree scan:
#   scripts/check-secret-prefixes.sh --all
#   python3 scripts/check_flag_registry.py

repos:
  - repo: local
    hooks:
      - id: check-secret-prefixes
        name: Check for live-key prefixes (Anthropic, Clerk, Google, …)
        entry: scripts/check-secret-prefixes.sh
        language: system
        pass_filenames: true
        files: \.(env|env\..*|md|yml|yaml|ts|tsx|py|sh|json|txt)$
        exclude: 'node_modules/|\.venv/|\.git/'

      - id: check-card-arrival-contract
        name: Check generated card-arrival contracts
        entry: python3 scripts/sync-card-arrival-contract.py --check
        language: system
        pass_filenames: false
        files: '(^docs/contracts/card-arrival\.json$|cardArrivalContract\.generated\.ts$|card_arrival_contract_generated\.py$)'

      - id: check-flag-registry
        name: Check no feature flag is past its review/removal date
        entry: python3 scripts/check_flag_registry.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-doc-governance
        name: Check new docs carry lifecycle metadata
        entry: python3 scripts/check_doc_governance.py --staged-new
        language: system
        pass_filenames: false
        always_run: true

      - id: check-doc-inventory
        name: Check every workspace doc has an inventory disposition
        entry: python3 scripts/check_doc_inventory.py --steady
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-doc-spine
        name: Check canonical documentation spine
        entry: python3 scripts/check_docs_spine.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-doc-current-state
        name: Check generated documentation current state
        entry: python3 scripts/render_current_state.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-child-doc-governance
        name: Check new child-repo documentation admission
        entry: python3 scripts/check_child_doc_governance.py
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: check-living-doc-links
        name: Check links in living workspace documentation
        entry: python3 scripts/check_living_doc_links.py
        language: system
        pass_filenames: false
        stages: [pre-push]
