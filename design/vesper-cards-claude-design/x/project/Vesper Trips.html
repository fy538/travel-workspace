<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Trips — three directions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="v3-shared.jsx"></script>
  <script type="text/babel" src="trips-shared.jsx"></script>
  <script type="text/babel" src="trips-1.jsx"></script>
  <script type="text/babel" src="trips-2.jsx"></script>
  <script type="text/babel" src="trips-3.jsx"></script>

  <script type="text/babel">
    function Phn({ children }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
          {children}
        </div>
      );
    }

    function Note({ children, italic }) {
      return <p style={{
        margin: '0 0 10px', fontSize: 13.5, lineHeight: 1.55, color: '#2C2622',
        fontStyle: italic ? 'italic' : 'normal',
        fontFamily: italic ? T.serif : T.sans,
      }}>{children}</p>;
    }

    function Logic({ eyebrow, title, children }) {
      return (
        <div style={{
          width: 440, padding: '36px 28px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft,
        }}>
          <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>{eyebrow}</div>
          <h2 style={{
            fontFamily: T.serif, fontWeight: 500, fontSize: 30, lineHeight: 1.05,
            letterSpacing: -0.7, color: T.ink, margin: '0 0 16px',
          }}>{title}</h2>
          <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>{children}</div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.6}>
          {/* ── INTRO ── */}
          <DCSection
            id="cover"
            title="Vesper · Trips — three directions"
            subtitle="Trips is the forward-facing sibling of Atlas. Same paper, different posture."
          >
            <DCArtboard id="brief" label="Brief & system" width={580} height={870} bg="#F1ECE2">
              <div style={{ padding: '44px 34px', fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>VESPER · TRIPS</div>
                <h1 style={{ fontFamily: T.serif, fontSize: 46, lineHeight: 0.98, letterSpacing: -1.2, fontWeight: 500, margin: '8px 0 18px', color: T.ink }}>
                  Three ways to<br/>look at <em>what’s next.</em>
                </h1>
                <p style={{ margin: '0 0 18px' }}>
                  Atlas asks <i>what have I kept?</i> Trips asks <i>what is about to happen?</i>
                  Same warm paper, same serif/sans pairing — but a new <b>ink-blue</b> accent
                  enters for planning affordances (dates, active trip, decisions). Ochre stays
                  reserved for Vesper’s voice across both tabs.
                </p>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 10, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>SHARED SYSTEM</div>
                  <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 8 }}>
                    <li><b>Paper / Ink</b> shared with Atlas (#EFEAE0 · #1B1714)</li>
                    <li><b>Planning accent</b> ink-blue #3D5066 (deep #2A384B)</li>
                    <li><b>Vesper voice</b> ochre #B0853A (unchanged)</li>
                    <li><b>Dreaming tint</b> sage #7C8F73 (used only in TripPill)</li>
                    <li><b>Type</b> Cormorant Garamond display · DM Sans body · JetBrains Mono dates/codes</li>
                  </ul>
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 14, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>REMOVED FROM CURRENT SCREEN</div>
                  <ul style={{ margin: 0, paddingLeft: 18, display: 'grid', gap: 4 }}>
                    <li>Repetitive 4× “Somewhere new” cards with sunset paintings</li>
                    <li>“DATES NOT SET YET · 1 TRAVELLER · ARCHIVED” meta strip used everywhere</li>
                    <li>Loud SaaS-blue starter-card icons (City break / Beach week / Festival)</li>
                    <li>Disconnected “Your map” + briefcase footer button</li>
                    <li>Title “Trips · 8 trips” at the top — pure counter, no posture</li>
                  </ul>
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 14, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>HOW TRIPS CONNECTS</div>
                  <ul style={{ margin: 0, paddingLeft: 18, display: 'grid', gap: 4 }}>
                    <li><b>→ Atlas</b> · a “bridge to Atlas” card appears after every trip ends — Vesper drafts a postcard, you send it across</li>
                    <li><b>→ Vesper</b> · Vesper has a dedicated ochre-dashed card on Trips, not a chat takeover. Tap routes to the Vesper tab with context</li>
                    <li><b>→ Discover</b> · saved places + “begin from Discover” cross-pollinate. A saved Discover item can become a trip draft in one tap</li>
                  </ul>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── DIRECTION A ── */}
          <DCSection
            id="da"
            title="A · Planning Table"
            subtitle="Active planner state. Tactile surface. The alive trip is the main object."
          >
            <DCArtboard id="a-mock" label="Planning Table" width={415} height={870} bg="transparent"><Phn><TripsPlanningTable/></Phn></DCArtboard>
            <DCArtboard id="a-notes" label="Logic & cold start" width={440} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION A" title="The planning table.">
                <Note italic>“This trip is alive.” One trip earns the hero treatment; everything else is on the desk around it.</Note>
                <Note><b>Hero trip object</b> — destination scene + dates + an 8-grid of <i>planning pieces</i> (travelers, saved places, open decisions, Vesper note). Each piece is a tiny tile, not a row. Bottom of the card carries the <i>NEXT · ON THE TABLE</i> nudge with an ink-blue “Open trip” chip.</Note>
                <Note><b>Drafts strip</b> — three tilted cards. Status pill drives the read (DREAMING / PENCILLED / NEEDS YOU). Slight rotations make them feel scattered, not gridded.</Note>
                <Note><b>Bridge to Atlas</b> — a single ochre-dashed row at the bottom: “Vesper drafted a postcard from Lisbon. Send it to Atlas?” Trips → Atlas handoff in one sentence.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Cold start</b><br/>
                  Hero collapses to a single dashed card: “Tell Vesper where you’re going.” Drafts strip becomes one wide invitation. Bridge-to-Atlas is hidden until first trip ends.
                </div>
                <div style={{ marginTop: 10, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Hero card 18 radius · planning-piece tile 10 radius · status pill 9.5 / 1.4 ls / 700 with 5 px dot · ink-blue chip 6 px V-pad / 12 px H-pad · drafts tilted ±1.6°.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── DIRECTION B ── */}
          <DCSection
            id="db"
            title="B · Departure Board"
            subtitle="Frequent traveler state. Structured, scannable, still warm."
          >
            <DCArtboard id="b-mock" label="Departure Board" width={415} height={870} bg="transparent"><Phn><TripsDepartureBoard/></Phn></DCArtboard>
            <DCArtboard id="b-notes" label="Logic & cold start" width={440} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION B" title="The departure board.">
                <Note italic>For the user who keeps four trips alive at once. Reads like a sober train-station board, warmed by serif numerals.</Note>
                <Note><b>List rows</b> — three columns: <i>WHEN</i> (serif date numerals, ink-blue when alive), <i>TRIP · STATE</i> (title + italic descriptor + status pill + collaborators), and an open-arrow. Days-out counter sits under the date.</Note>
                <Note><b>The four states</b> — ALIVE (ink-blue), NEEDS YOU (ochre), IN VOTING / DREAMING (sage). One pill per row, no other chrome. The “—/—” dateless rows still fit the grid — they just earn quieter color.</Note>
                <Note><b>Unresolved bar</b> — a single ochre-tinted card surfacing decisions across <i>all</i> trips: “Ryokan in Tokyo · dates for Porto · 2 more.” Replaces individual notifications.</Note>
                <Note><b>Quick starts</b> — five tiny tiles in one inline row at the bottom. Tap or hand off to Vesper.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Cold start</b><br/>
                  Departure list shows an empty placeholder row: <i>“No trips on the board yet.”</i> The five quick-start tiles get promoted to a single full-width “Begin a trip” card with the same five glyphs inside.
                </div>
                <div style={{ marginTop: 10, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Date numeral serif 28 / -0.5 ls / oldstyle-nums · row pad 14 V · hairline 0.5 px @ 6% · MMM caps 9 / 1.6 ls 700 · arrow icon 14 px / mute color · starter tile 10 px V-pad.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── DIRECTION C ── */}
          <DCSection
            id="dc"
            title="C · Dream Stack"
            subtitle="Light-user state. Editorial, future-facing. Possible trips fan as a deck."
          >
            <DCArtboard id="c-mock" label="Dream Stack" width={415} height={870} bg="transparent"><Phn><TripsDreamStack/></Phn></DCArtboard>
            <DCArtboard id="c-notes" label="Logic & cold start" width={440} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION C" title="The dream stack.">
                <Note italic>For users who haven’t booked yet — and for the part of every user that hasn’t. “Where to?” is the central question, not “What needs my attention?”</Note>
                <Note><b>Fanned deck</b> — up to four possibilities stacked: the alive trip in front with an ink-blue rule, and three “dreaming” / “needs you” cards behind it at small rotations. The deck has a <i>1 / 4</i> position chip — implies you can flick through.</Note>
                <Note><b>Vesper's reading</b> — a dashed-gold card surfaces Vesper-generated ideas drawn from saved Discover items: “Three ideas for <i>a slow week</i>” with three italic chips. This is the cross-pollination from Discover.</Note>
                <Note><b>Begin one</b> — quick-start glyphs at the bottom. Includes a <i>Quiet</i> option that doesn’t exist in the other directions, because dreaming users care about <i>mood</i> not <i>format</i>.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Cold start</b><br/>
                  Deck reduces to one card: a blank, dashed-gold “first dream” postcard reading “A place you keep imagining…”. Vesper’s reading card sits below with three example chips drawn from <i>Discover</i> trending. No starters yet — Vesper carries the room.
                </div>
                <div style={{ marginTop: 10, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Card stack height 232 · rotations [-7°, +5°, -2°, +1.4°] · z-index 1→4 · primary card ink-blue 0.8 px rule + 28 px → action · deck chip mono 9 / 1.4 ls in 999 radius.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── RECOMMENDATION ── */}
          <DCSection
            id="rec"
            title="Recommendation"
            subtitle="Which direction to ship, and how Trips talks to the rest of the app."
          >
            <DCArtboard id="rec-card" label="Recommendation" width={920} height={780} bg="#F1ECE2">
              <div style={{ padding: '44px', fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>RECOMMENDATION</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 40, fontWeight: 500, letterSpacing: -0.9, lineHeight: 1.04, color: T.ink, margin: '8px 0 10px' }}>
                  Ship a hybrid. <em>A is the canvas, B is the long view, C is the day one.</em>
                </h2>
                <p style={{ maxWidth: 780, margin: '0 0 18px' }}>
                  Direction <b>A · Planning Table</b> is the right baseline for the engaged user.
                  Borrow <b>B · Departure Board</b>’s serif-numeral row pattern for the <i>“drafts”</i>
                  area when more than three trips are alive. Use <b>C · Dream Stack</b> as the cold-start
                  and light-user state — switch automatically when the user has no upcoming dated trips.
                </p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginTop: 6 }}>
                  {[
                    { t: 'A · Planning Table', d: 'Recommended baseline. Hero alive trip + scattered drafts + Atlas bridge. Best for the 1–3 trip user.' },
                    { t: 'B · Departure Board', d: 'Best at scale (4+ trips). Donate the serif-date row pattern to A’s drafts strip. Use Unresolved bar as the universal decisions inbox.' },
                    { t: 'C · Dream Stack',     d: 'Best cold-start and light user. Auto-switch when 0 upcoming dated trips. Vesper carries the room.' },
                  ].map((c, i) => (
                    <div key={i} style={{
                      background: '#FBF7EC', borderRadius: 12, padding: '18px 18px',
                      border: i === 0 ? `0.8px solid ${TR.ink}` : `0.5px solid rgba(27,23,20,0.07)`,
                    }}>
                      <div style={{ fontFamily: T.serif, fontSize: 18, fontWeight: 500, color: T.ink, letterSpacing: -0.3 }}>{c.t}</div>
                      <div style={{ fontSize: 12, color: T.mute, marginTop: 6, lineHeight: 1.5 }}>{c.d}</div>
                    </div>
                  ))}
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 26, paddingTop: 16 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 10 }}>EDGE CASES & STATES</div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
                    {[
                      ['No trips', 'Switch to C · Dream Stack. Vesper offers three ideas based on Discover trending.'],
                      ['One vague idea', 'A · Planning Table, hero collapsed to a dashed card. “Add a date, a place, or a person.”'],
                      ['Active planner (1 trip)', 'A · Planning Table as designed. Hero earns the page.'],
                      ['Group trip', 'Hero card gains a collaborators row + open-decisions chip. Voting state lives in Unresolved.'],
                      ['Frequent traveler (4+)', 'Hero stays, drafts strip swaps to B’s serif-numeral list pattern.'],
                      ['Just returned', 'Bridge-to-Atlas card moves to the top, just under the hero, until the postcard is sent.'],
                    ].map(([k, v]) => (
                      <div key={k} style={{ background: '#FBF7EC', borderRadius: 10, padding: '12px 14px', border: '0.5px solid rgba(27,23,20,0.07)' }}>
                        <div style={{ fontFamily: T.serif, fontSize: 14, fontWeight: 500, color: T.ink, letterSpacing: -0.2 }}>{k}</div>
                        <div style={{ fontSize: 11.5, color: T.mute, marginTop: 4, lineHeight: 1.45 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 18, paddingTop: 14, display: 'flex', gap: 18, alignItems: 'center' }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600 }}>RELATED CANVASES</div>
                  <a href="Atlas Redesign.html" style={{
                    padding: '7px 12px', background: '#FBF7EC', border: '0.5px solid rgba(27,23,20,0.10)',
                    borderRadius: 999, color: T.ink, textDecoration: 'none', fontSize: 12, fontWeight: 500,
                  }}>← Atlas · six directions</a>
                  <a href="Atlas Direction 03.html" style={{
                    padding: '7px 12px', background: '#FBF7EC', border: `0.5px solid ${T.gold}`,
                    borderRadius: 999, color: T.ink, textDecoration: 'none', fontSize: 12, fontWeight: 500,
                  }}>Atlas · 03 full flow →</a>
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
