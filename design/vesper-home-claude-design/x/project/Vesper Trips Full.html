<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Trips — the full system</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="v3-shared.jsx"></script>
  <script type="text/babel" src="trips-shared.jsx"></script>
  <script type="text/babel" src="trips-home-states.jsx"></script>
  <script type="text/babel" src="trips-aux.jsx"></script>

  <script type="text/babel">
    function Phn({ children }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
          {children}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.5}>
          {/* ── COVER · the state machine ── */}
          <DCSection
            id="cover"
            title="Vesper · Trips — the system"
            subtitle="A hybrid: one layout, four shapes. The home auto-tunes to the state of your travel life."
          >
            <DCArtboard id="brief" label="System & state machine" width={1000} height={870} bg="#F1ECE2">
              <div style={{ padding: '44px 44px 32px', fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>VESPER · TRIPS · SYSTEM</div>
                <h1 style={{ fontFamily: T.serif, fontSize: 50, lineHeight: 0.96, letterSpacing: -1.3, fontWeight: 500, margin: '8px 0 14px', color: T.ink }}>
                  One home,<br/><em>five postures.</em>
                </h1>
                <p style={{ margin: '0 0 22px', maxWidth: 740 }}>
                  Trips uses one layout grammar — a hero <i>alive trip</i>, scattered drafts, an Atlas
                  bridge — and re-tunes it based on where you are in your travel life. Five home states,
                  one + page, one notifications page.
                </p>

                {/* State machine — rows */}
                <div style={{
                  display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12,
                  borderTop: `0.5px solid ${T.hairline}`, paddingTop: 18,
                }}>
                  {[
                    { n: 'COLD',     ti: 'Where to?',         when: '0 upcoming dated trips',          notes: 'C · Dream Stack. Vesper carries the room. One dashed-gold first dream.' },
                    { n: 'DEFAULT',  ti: 'Your planning table.', when: '1–3 trips, one alive',         notes: 'A · Planning Table. Hero earns the page. Drafts scatter, bridge to Atlas.' },
                    { n: 'ON TRIP',  ti: 'You’re in Tokyo.',  when: 'between depart + return',         notes: 'Live hero. Today’s posture, three time-stamped cards, save-a-moment.' },
                    { n: 'RETURNED', ti: 'Lisbon, in your hands now.', when: 'first 14 days after return', notes: 'Atlas bridge is the hero. Postcard preview. Continuing plans below.' },
                    { n: 'FREQUENT', ti: 'Seven on the table.', when: '4+ drafts',                     notes: 'A’s hero + B’s serif-numeral rows in drafts. Unresolved bar still applies.' },
                  ].map((s, i) => (
                    <div key={s.n} style={{
                      background: '#FBF7EC', padding: '14px 14px', borderRadius: 12,
                      border: '0.5px solid rgba(27,23,20,0.08)',
                    }}>
                      <div style={{ fontSize: 9, letterSpacing: 1.8, color: TR.ink, fontWeight: 700 }}>
                        {String(i + 1).padStart(2, '0')} · {s.n}
                      </div>
                      <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 500, color: T.ink, marginTop: 6, letterSpacing: -0.3, lineHeight: 1.1 }}>
                        {s.ti}
                      </div>
                      <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 11, color: T.mute, marginTop: 4 }}>
                        {s.when}
                      </div>
                      <div style={{ borderTop: `0.5px solid ${T.hairThin}`, marginTop: 10, paddingTop: 8, fontSize: 11, lineHeight: 1.4, color: T.mute }}>
                        {s.notes}
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{
                  display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18, marginTop: 22,
                  borderTop: `0.5px solid ${T.hairline}`, paddingTop: 18,
                }}>
                  <div>
                    <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 10 }}>VISUAL VOICES</div>
                    <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 8 }}>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: TR.ink, marginRight: 8, verticalAlign: 'middle' }}/><b>Ink-blue</b> · planning · dates · active state · primary CTAs</li>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: T.gold, marginRight: 8, verticalAlign: 'middle' }}/><b>Ochre</b> · Vesper’s voice · suggestions · Atlas handoff</li>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: TR.dreaming, marginRight: 8, verticalAlign: 'middle' }}/><b>Sage</b> · dreaming · ideas · pre-decision</li>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: T.muteSoft, marginRight: 8, verticalAlign: 'middle' }}/><b>Mute</b> · paused · archived · metadata</li>
                    </ul>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 10 }}>CROSS-TAB BEHAVIOR</div>
                    <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 6 }}>
                      <li><b>+ button</b> → Begin a trip (talk to Vesper · blank canvas · pick a shape)</li>
                      <li><b>🔔 bell</b> → Updates · sectioned by Live / Planning / Returned</li>
                      <li><b>→ Atlas</b> · auto-drafted postcard on every return</li>
                      <li><b>→ Discover</b> · saved places feed quick-starts &amp; Vesper ideas</li>
                      <li><b>→ Vesper</b> · the chat-style entry lives inside the + flow</li>
                    </ul>
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── HOMES ── */}
          <DCSection
            id="homes"
            title="The five home states"
            subtitle="Same layout grammar, retuned per state. The bottom tab + safe area are identical across all five."
          >
            <DCArtboard id="home-cold"     label="Cold start (C)"   width={415} height={870} bg="transparent"><Phn><HomeCold/></Phn></DCArtboard>
            <DCArtboard id="home-default"  label="Default (A)"      width={415} height={870} bg="transparent"><Phn><HomeDefault/></Phn></DCArtboard>
            <DCArtboard id="home-on"       label="On a trip"        width={415} height={870} bg="transparent"><Phn><HomeOnTrip/></Phn></DCArtboard>
            <DCArtboard id="home-returned" label="Just returned"    width={415} height={870} bg="transparent"><Phn><HomeReturned/></Phn></DCArtboard>
            <DCArtboard id="home-frequent" label="Frequent (A + B)" width={415} height={870} bg="transparent"><Phn><HomeFrequent/></Phn></DCArtboard>
            <DCArtboard id="home-notes"    label="State logic"      width={460} height={870} bg="transparent">
              <div style={{
                width: 420, padding: '36px 28px', background: '#F1ECE2',
                borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55,
              }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>HOME · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>
                  How the home re-tunes.
                </h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}><b>Cold</b> — no dated trips. The deck-of-cards metaphor from Dream Stack collapses to one dashed-gold blank postcard. Vesper carries the room with three trending Discover ideas. Begin-one glyphs sit at the bottom.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Default</b> — the canvas state. Hero alive trip with four planning pieces. Drafts strip with 2–3 tilted cards driven by status pills. Single ochre-dashed Atlas bridge footer.</p>
                  <p style={{ margin: '0 0 12px' }}><b>On a trip</b> — between depart and return. The hero abandons planning pieces and shows <i>today</i>: a posture line (“you’re due for one quiet hour”), three time-stamped cards (NOW · AFTERNOON · TONIGHT), and a dashed “Save a moment to Atlas” call.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Just returned</b> — first 14 days back. The Atlas bridge is promoted from footer to <i>hero</i>: a large postcard preview, “Send to Atlas” as the primary action. Continuing plans demoted to a quiet list below.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Frequent</b> — 4+ drafts. Hero stays the same but compacts (no planning grid). Drafts swap to B’s serif-numeral row pattern with month/day on the left and a status pill on the right.</p>
                  <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                    <b style={{ color: T.ink }}>Group trip</b> isn’t a separate state — it’s an overlay. Hero gains a collaborators row + an open-decisions chip in any state.
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── + CREATE TRIP ── */}
          <DCSection
            id="create"
            title="+ · Begin a trip"
            subtitle="The + button on every Trips screen. Talk to Vesper, or start blank."
          >
            <DCArtboard id="create-mock" label="Begin a trip" width={415} height={870} bg="transparent"><Phn><TripsCreate/></Phn></DCArtboard>
            <DCArtboard id="create-notes" label="Logic" width={440} height={870} bg="transparent">
              <div style={{
                width: 420, padding: '36px 28px', background: '#F1ECE2',
                borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55,
              }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>+ · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>
                  Two doors in, six shapes inside.
                </h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Talk it through with Vesper</b> — ochre primary, RECOMMENDED chip. Tapping
                    routes into the Vesper tab pre-seeded with a “new trip” thread and a placeholder
                    prompt (<i>“a quiet week in september, somewhere coastal…”</i>). Outside of scope here.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Start with a blank canvas</b> — ink-blue secondary. Opens an empty trip
                    with just a title and date field. Single trip page is out of scope here.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Six shapes</b> — City / Beach / Mountain / Road / Festival / Quiet. Pre-seed
                    the blank canvas with a default itinerary skeleton + Vesper personality (e.g.
                    Quiet skips the agenda grid). Each glyph is restrained line-art, not the saturated
                    blue icons from the current screen.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Continue from Discover</b> — surfaces if the user has saved Discover items.
                    Tapping pivots into a “build a trip around these places” flow. The bridge from
                    Discover into Trips.
                  </p>
                  <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                    <b style={{ color: T.ink }}>Why two paths, not one</b><br/>
                    Some users want to type. Others want to think out loud. Forcing one mode loses
                    the other — and the two doors create a clear product hierarchy: Vesper is
                    primary, blank is the escape valve.
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── NOTIFICATIONS ── */}
          <DCSection
            id="notif"
            title="🔔 · Updates"
            subtitle="Sectioned by the trip state: Live · Planning · Returned. No global feed, no marketing pushes."
          >
            <DCArtboard id="notif-mock" label="Updates" width={415} height={870} bg="transparent"><Phn><TripsNotifications/></Phn></DCArtboard>
            <DCArtboard id="notif-notes" label="Logic" width={440} height={870} bg="transparent">
              <div style={{
                width: 420, padding: '36px 28px', background: '#F1ECE2',
                borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55,
              }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>🔔 · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>
                  Only what the trip is doing.
                </h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Three sections, in trip-time order</b> — Live (currently on a trip), Planning
                    (decisions, collab, Vesper drafts), Returned (Atlas handoff, kept entries).
                    Mirrors the home-state machine exactly.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Each row has one source</b> — Vesper (ochre dot), a collaborator (ink-blue),
                    a system (mute). Source + relative time live in the metadata caption row, never
                    inside the title.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>One action per row</b> — OPEN · REVIEW · CONFIRM · VOTE · SEE. Mono-leaning
                    label in a thin rule, not a button. Returned-section actions get the ochre treatment
                    to bias the user toward Atlas.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Title posture</b> — “What changed, <i>since you looked.</i>” The page reads
                    as a quiet report, not a notification dump.
                  </p>
                  <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                    <b style={{ color: T.ink }}>What’s NOT here</b><br/>
                    Marketing pushes. App-update banners. Generic “check out new features.” Travel
                    deals. Bell only carries the user’s own trips — anything else lives in the Vesper
                    tab.
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── RELATED CANVASES ── */}
          <DCSection
            id="links"
            title="Related"
            subtitle="Earlier explorations this builds on."
          >
            <DCArtboard id="links-card" label="Related canvases" width={760} height={360} bg="#F1ECE2">
              <div style={{ padding: 36, fontFamily: T.sans, color: T.inkSoft }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>RELATED CANVASES</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 28, fontWeight: 500, letterSpacing: -0.6, color: T.ink, margin: '8px 0 18px' }}>
                  Where this came from.
                </h2>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <a href="Vesper Trips.html" style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '12px 16px', background: '#FBF7EC',
                    border: '0.5px solid rgba(27,23,20,0.10)', borderRadius: 12,
                    color: T.ink, textDecoration: 'none',
                  }}>
                    <span>
                      <div style={{ fontFamily: T.serif, fontSize: 16, fontWeight: 500 }}>Vesper · Trips — three directions</div>
                      <div style={{ fontSize: 12, color: T.mute, marginTop: 2 }}>A · Planning · B · Departure · C · Dream Stack</div>
                    </span>
                    <span style={{ color: T.goldDeep }}>→</span>
                  </a>
                  <a href="Atlas Redesign.html" style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '12px 16px', background: '#FBF7EC',
                    border: '0.5px solid rgba(27,23,20,0.10)', borderRadius: 12,
                    color: T.ink, textDecoration: 'none',
                  }}>
                    <span>
                      <div style={{ fontFamily: T.serif, fontSize: 16, fontWeight: 500 }}>Atlas — six directions</div>
                      <div style={{ fontSize: 12, color: T.mute, marginTop: 2 }}>Refined, Editorial, Artifact, Almanac, Passport, Letter</div>
                    </span>
                    <span style={{ color: T.goldDeep }}>→</span>
                  </a>
                  <a href="Atlas Direction 03.html" style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '12px 16px', background: '#FBF7EC',
                    border: `0.5px solid ${T.gold}`, borderRadius: 12,
                    color: T.ink, textDecoration: 'none',
                  }}>
                    <span>
                      <div style={{ fontFamily: T.serif, fontSize: 16, fontWeight: 500 }}>Atlas · Direction 03 — full flow</div>
                      <div style={{ fontSize: 12, color: T.mute, marginTop: 2 }}>Atlas, ten screens — the sibling of this canvas</div>
                    </span>
                    <span style={{ color: T.goldDeep }}>→</span>
                  </a>
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
