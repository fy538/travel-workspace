<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Discover — 3 directions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="v3-shared.jsx"></script>
  <script type="text/babel" src="discover-kit.jsx"></script>
  <script type="text/babel" src="discover-1.jsx"></script>
  <script type="text/babel" src="discover-2.jsx"></script>
  <script type="text/babel" src="discover-3.jsx"></script>

  <script type="text/babel">
    const Phn = ({ children }) => <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>{children}</div>;
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>{children}</div>;
    const H2 = ({ children }) => <h2 style={{ fontFamily: T.serif, fontWeight: 500, fontSize: 30, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '8px 0 14px' }}>{children}</h2>;
    function Note({ children, italic }) { return <p style={{ margin: '0 0 11px', fontSize: 13.5, lineHeight: 1.55, color: T.inkSoft, fontFamily: italic ? T.serif : T.sans, fontStyle: italic ? 'italic' : 'normal' }}>{children}</p>; }
    function Spec({ children }) { return <div style={{ marginTop: 12, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute, lineHeight: 1.5 }}>{children}</div>; }

    function Logic({ eyebrow, title, children, w = 440 }) {
      return (
        <div style={{ width: w, padding: '36px 28px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft }}>
          <EB>{eyebrow}</EB><H2>{title}</H2>
          <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>{children}</div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.55}>
          {/* COVER */}
          <DCSection id="cover" title="Vesper · Discover" subtitle="Outside-in: Vesper's read on the world. Sibling to Atlas (inside-out memory) — but editorial intelligence, not archive. Three directions.">
            <DCArtboard id="brief" label="Brief & system" width={600} height={760} bg="#F1ECE2">
              <div style={{ padding: '44px 34px', fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <EB>VESPER · DISCOVER</EB>
                <h1 style={{ fontFamily: T.serif, fontSize: 44, lineHeight: 0.98, letterSpacing: -1.2, fontWeight: 500, margin: '8px 0 14px', color: T.ink }}>
                  A local with taste,<br/><em>opening a place for you.</em>
                </h1>
                <Note>Discover isn’t a feed, a grid, or a search console. It’s Vesper’s point of view on what’s worth noticing — “this is not everything; this is what matters.”</Note>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 6, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>FIXED ACROSS ALL THREE</div>
                  <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 7 }}>
                    <li><b>Surfaces</b> — parchment #EFEAE0, cream cards #F7F2E7, restrained ink #1B1714.</li>
                    <li><b>Accents</b> — gold/earth (#B0853A · #A6703C) for editorial marks.</li>
                    <li><b>Violet #675BA0</b> — only when Vesper speaks or is attributed (spark, “+ Vesper”, lens chip, Ask Vesper).</li>
                    <li><b>Lenses</b> — Why here · A day in · For the obsessed · Insider · The debate · Ritual.</li>
                    <li><b>Type</b> — Cormorant Garamond display/body · DM Sans labels · Mono metadata.</li>
                  </ul>
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 14, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>WHAT CHANGES FROM TODAY</div>
                  <ul style={{ margin: 0, paddingLeft: 18, display: 'grid', gap: 4 }}>
                    <li>A real “Vesper’s read” module replaces the bare title + search.</li>
                    <li>The endless 2-col masonry becomes a curated, sectioned page.</li>
                    <li>Active place (Lisbon) becomes legible, not a faint caption.</li>
                    <li>Friends becomes trusted signal, not another generic feed.</li>
                    <li>No ratings, likes, “Top 10”, or map-dashboard energy.</li>
                  </ul>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* DIR 1 */}
          <DCSection id="d1" title="1 · Editorial Front Page" subtitle="A refined travel-magazine Discover. Strong lead read, then curated sections. Calm, premium, highly readable.">
            <DCArtboard id="d1-home" label="Discover home" width={415} height={870} bg="transparent"><Phn><D1Home/></Phn></DCArtboard>
            <DCArtboard id="d1-dossier" label="Dossier" width={415} height={870} bg="transparent"><Phn><D1Dossier/></Phn></DCArtboard>
            <DCArtboard id="d1-notes" label="Rationale & impl" width={440} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 1" title="The front page.">
                <Note italic>Discover as a magazine you trust — one lead read, then editor’s sections.</Note>
                <Note><b>Rationale</b> — calm and authoritative. A single “Vesper’s read · today” lead with a real thesis and standfirst earns the first viewport; the page then reads like curated sections, not an infinite grid.</Note>
                <Note><b>Changes</b> — masthead “Discover” + legible active place (Lisbon · tuned to your taste). Underline segmented control (Vesper tab set in italic serif). Feed → named sections (“Where Vesper would go first”).</Note>
                <Note><b>Dossier</b> — full-bleed hero, lens chip over image, drop-cap opener, a left-ruled <i>Vesper’s thesis</i>, mono metadata (place · read · lens). Bottom bar: <b>Save to your world</b> + violet <b>Ask Vesper</b> + share.</Note>
                <Spec><b>Impl</b> — 22px margins · lead plate 178h/14r · section cards 96h/10r · title Cormorant 23–27/-0.4 · eyebrow DM 9.5/1.8ls · seg underline 1.5px (violet on Vesper) · sticky bar blur 20px over parchment 90%.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* DIR 2 */}
          <DCSection id="d2" title="2 · Field Notes / Intelligence Desk" subtitle="The top module is a field briefing: what matters, what to notice, what to skip, what's timely.">
            <DCArtboard id="d2-home" label="Discover home" width={415} height={870} bg="transparent"><Phn><D2Home/></Phn></DCArtboard>
            <DCArtboard id="d2-dossier" label="Dossier" width={415} height={870} bg="transparent"><Phn><D2Dossier/></Phn></DCArtboard>
            <DCArtboard id="d2-notes" label="Rationale & impl" width={440} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 2" title="The intelligence desk.">
                <Note italic>Discover as Vesper’s standing read on a place — a briefing, not a gallery.</Note>
                <Note><b>Rationale</b> — most useful when personalization is thin: the briefing is valuable on its own. Structured rows (What matters / Notice / Skip / Timely) give Vesper an unmistakable point of view, colour-coded by stance.</Note>
                <Note><b>Changes</b> — photography demoted to small thumbs; type + structure lead. Refined pill segmented control. Masonry → a compact “Dispatches” list under the briefing.</Note>
                <Note><b>Dossier</b> — a metadata grid header (place · lens · read · updated), a left-ruled thesis, and an inline <i>Notice / Skip</i> callout in the body. Reads like a field report you’d save.</Note>
                <Spec><b>Impl</b> — briefing card 16r, 74px label column · stance dots (violet/earth/mute/green) · dispatch thumb 64²/10r · metadata grid 2-col hairline · desk action bar = Save · Ask Vesper · Share (3-up).</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* DIR 3 */}
          <DCSection id="d3" title="3 · Desire Engine" subtitle="Immersive and tempting. Large imagery, fewer/stronger cards, more 'I want to go there.' Still tasteful.">
            <DCArtboard id="d3-home" label="Discover home" width={415} height={870} bg="transparent"><Phn><D3Home/></Phn></DCArtboard>
            <DCArtboard id="d3-dossier" label="Dossier" width={415} height={870} bg="transparent"><Phn><D3Dossier/></Phn></DCArtboard>
            <DCArtboard id="d3-notes" label="Rationale & impl" width={440} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 3" title="The desire engine.">
                <Note italic>For the part of every user that wants to be seduced into going.</Note>
                <Note><b>Rationale</b> — a near-full-bleed hero with one evocative line does the emotional work; a small “Next, if this moves you” pair teases more without becoming a grid. Restraint (no influencer captions, no metrics) keeps it premium.</Note>
                <Note><b>Changes</b> — boldest departure: imagery-first, dark immersive home, glass segmented control floating on the photo. Fewer, larger cards. Vesper’s voice stays a quiet violet line, never a hard sell.</Note>
                <Note><b>Dossier</b> — a 408px immersive hero with the title low on the image, then the read on parchment with an italic opening hook. Save reads as <i>keeping</i> a place, not bookmarking content.</Note>
                <Spec><b>Impl</b> — hero 620h home / 408h dossier · single soft top-to-bottom scrim (no loud gradient) · glass controls blur 10px · hero title Cormorant 38/-1 · teasers 132h/14r · same violet Ask Vesper bar.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* RECOMMENDATION */}
          <DCSection id="rec" title="Recommendation" subtitle="How I'd combine them.">
            <DCArtboard id="rec-card" label="Ship" width={780} height={460} bg="#F1ECE2">
              <div style={{ padding: 40, fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <EB>RECOMMENDATION</EB>
                <H2>Editorial Front Page as the frame; borrow from both siblings.</H2>
                <Note w={640}>Ship <b>Direction 1</b> as the structure — it’s the most readable and the most “Vesper has a point of view.” Fold in <b>Direction 2’s briefing</b> as the top module of the “Vesper” segment (the intelligence read on the active place), and lend <b>Direction 3’s immersive hero</b> to the single lead read so the first card still tempts. Friends becomes a third, genuinely social segment: saves and notes from people you trust, attributed.</Note>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 8, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>IN ONE LINE</div>
                  <p style={{ margin: 0, fontFamily: T.serif, fontSize: 18, color: T.ink, lineHeight: 1.4, letterSpacing: -0.2 }}>
                    A magazine that opens with a briefing and a photograph — and never once shows you a rating.
                  </p>
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 14, paddingTop: 14, display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                  <a href="Vesper Cards.html" style={{ padding: '7px 12px', background: '#FBF7EC', border: '0.5px solid rgba(27,23,20,0.10)', borderRadius: 999, color: T.ink, textDecoration: 'none', fontSize: 12, fontWeight: 500 }}>Vesper cards →</a>
                  <a href="Vesper Home.html" style={{ padding: '7px 12px', background: '#FBF7EC', border: '0.5px solid rgba(27,23,20,0.10)', borderRadius: 999, color: T.ink, textDecoration: 'none', fontSize: 12, fontWeight: 500 }}>Vesper home →</a>
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
