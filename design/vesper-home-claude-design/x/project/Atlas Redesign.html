<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Atlas — 3 Directions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="variant-1.jsx"></script>
  <script type="text/babel" src="variant-2.jsx"></script>
  <script type="text/babel" src="variant-3.jsx"></script>
  <script type="text/babel" src="variant-4.jsx"></script>
  <script type="text/babel" src="variant-5.jsx"></script>
  <script type="text/babel" src="variant-6.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function Note({ children, italic }) {
      return <p style={{
        margin: '0 0 10px', fontSize: 13.5, lineHeight: 1.55, color: '#2C2622',
        fontStyle: italic ? 'italic' : 'normal',
        fontFamily: italic ? T.serif : T.sans,
      }}>{children}</p>;
    }

    function Logic({ title, eyebrow, children }) {
      return (
        <div style={{
          width: 420, padding: '36px 28px', background: '#F1ECE2',
          borderRadius: 8, color: T.inkSoft, height: 'fit-content',
        }}>
          <div style={{
            fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10,
          }}>{eyebrow}</div>
          <h2 style={{
            fontFamily: T.serif, fontWeight: 500, fontSize: 32, lineHeight: 1.05,
            letterSpacing: -0.8, color: T.ink, margin: '0 0 16px',
          }}>{title}</h2>
          <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
            {children}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.62}>
          <DCSection
            id="intro"
            title="Vesper · Atlas — three directions"
            subtitle="iPhone 393 × 852 · warm off-white, soft black, ochre accent · Cormorant Garamond + DM Sans"
          >
            <DCArtboard id="brief" label="Brief & system" width={560} height={852} bg="#F1ECE2">
              <div style={{ padding: '44px 34px', height: '100%', fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>VESPER · ATLAS</div>
                <h1 style={{ fontFamily: T.serif, fontSize: 44, lineHeight: 1, letterSpacing: -1, fontWeight: 500, margin: '8px 0 18px', color: T.ink }}>
                  Three<br/>readings of<br/><em>the same room.</em>
                </h1>
                <p style={{ margin: '0 0 18px' }}>
                  Atlas is the emotional home of Vesper — a place to revisit a travel life,
                  not a dashboard. Each direction keeps the four destinations
                  (<b>Inbox · Map · Travel DNA · Postcards</b>) and the bottom tab bar, but argues
                  for a different posture.
                </p>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 10, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>SHARED SYSTEM</div>
                  <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 8 }}>
                    <li><b>Paper</b> #EFEAE0 / #E8E2D4 · cards #F7F2E7–#FBF7EC</li>
                    <li><b>Ink</b> #1B1714 · soft #2C2622 · mute #86807A · faint #B5AFA5</li>
                    <li><b>Accent</b> ochre #B0853A (deep #8A6628, soft #D9BD86)</li>
                    <li><b>Type</b> Cormorant Garamond display · DM Sans body · JetBrains Mono dates</li>
                    <li><b>Scale</b> serif 56–72 / 22–24 / 17 · sans 13.5 / 11.5 / 10.5 caps</li>
                    <li><b>Spacing</b> 24 outer · 16 grid · 8 dense · safe-area 14</li>
                    <li><b>Radius</b> 22 hero · 14 shelf · 6 paper · 2 stamp</li>
                  </ul>
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 14, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>REMOVED FROM CURRENT SCREEN</div>
                  <ul style={{ margin: 0, paddingLeft: 18, display: 'grid', gap: 4 }}>
                    <li>Centered “Atlas” top label — redundant with bottom tab</li>
                    <li>“THE JOURNAL” section header bolted onto a 2×2 grid</li>
                    <li>“Quiet this week” treated as an alert</li>
                    <li>0-state postcard card written as marketing copy</li>
                    <li>Uniform grid where all four cards read identically</li>
                  </ul>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="d1"
            title="01 · Refined"
            subtitle="Premium iOS — familiar, calm, intentional. Recommended baseline."
          >
            <DCArtboard id="refined" label="Refined" width={415} height={870} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
                <VariantRefined/>
              </div>
            </DCArtboard>
            <DCArtboard id="refined-notes" label="Design logic" width={420} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 01" title="Refined iOS, with editorial restraint.">
                <Note italic>“Polished familiar.” The shape of a great native screen — but the copy stops behaving like a dashboard.</Note>
                <Note><b>Identity block</b> — a single serif headline that <i>reads the week</i> (“A quieter kind of week”). The quote sits underneath as a Vesper note, signed and dated, instead of being a free-floating decoration.</Note>
                <Note><b>2×2 grid</b> — same four destinations, but each card carries one number (“3 drafts”, “14 cities”) and one quiet italic phrase (“an early-morning soul”). The grid becomes legible at a glance without feeling like analytics.</Note>
                <Note><b>Latest postcard</b> — collapsed to a single shelf row with a paper-shaped placeholder. Zero-state is an object, not a marketing card.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Card 170×180 · 22 radius · 18 px pad · mark 70 px centered top · label serif 22 / -0.3 · meta sans 11 / mute · italic hint serif 10. Top edition stamp uses 11 px 2.2 ls caps.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="d2"
            title="02 · Editorial Index"
            subtitle="A journal cover meets a magazine index. Atlas as something printed."
          >
            <DCArtboard id="editorial" label="Editorial" width={415} height={870} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
                <VariantEditorial/>
              </div>
            </DCArtboard>
            <DCArtboard id="editorial-notes" label="Design logic" width={420} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 02" title="The atlas as a slow journal.">
                <Note italic>“This is the issue you’re living.” The whole screen is built around the metaphor of a personal periodical.</Note>
                <Note><b>Masthead</b> — “THE ATLAS” spaced caps · giant serif title (“Tiger, at large.”) · a rotated VOL · III stamp in ochre rule. The user is the author, not the user.</Note>
                <Note><b>Pull quote</b> — Vesper’s read of the user is set above the index, between hairlines, the way a magazine sets a kicker.</Note>
                <Note><b>Index list</b> — the four destinations are <i>numerated entries</i> with serif numerals, an italic descriptor, a tiny artifact glyph, and a quiet metadata caption (“3 WAITING”). Hairline rules between rows; pagination column on the right.</Note>
                <Note><b>Colophon</b> — “Set in slow time, by Vesper.” A footer that reframes the app as a craft object.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Headline serif 72 / 0.9 lh / -2.5 letterspacing · masthead caps 13 / 4 ls · index numerals serif 22 oldstyle-nums in ochre · row 14 v-pad · hairline 0.5 px ink @ 10%.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="d3"
            title="03 · Artifact-first"
            subtitle="The screen is the keepsake cabinet. Each tile is an object, not a tile."
          >
            <DCArtboard id="artifact" label="Artifact" width={415} height={870} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
                <VariantArtifact/>
              </div>
            </DCArtboard>
            <DCArtboard id="artifact-notes" label="Design logic" width={420} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 03" title="Open a drawer, find the thing.">
                <Note italic>“It feels like a gift.” The most emotional of the three — closest to “memory cabinet,” farthest from “dashboard.”</Note>
                <Note><b>Hero artifact</b> — “On your desk” places a stacked, slightly-rotated postcard at the top with a soft horizon illustration, an ochre stamp, and a date in mono. Even the zero state is shaped like an object, because Vesper drafts one for you.</Note>
                <Note><b>Asymmetric shelf</b> — “The shelf · four rooms.” Destinations are reshaped from a 2×2 into one tall keepsake (Inbox, marked NEW), two stacked compact ones (Map, DNA), and a wide bottom shelf (Postcards). Visual rhythm reads as a curio cabinet, not a grid.</Note>
                <Note><b>Identity</b> — moves into the top bar as “KEEPING FOR · Tiger,” a librarian framing rather than a profile page.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Hero card 220 h · two rotations (-3.2°, 2.2°) · 6 px radius · stamp 24×30 with ochre rule · shelf 14 px radius · tall tile 218 · compact 105 · wide 86. Tag NEW: 8.5 / 700 / 1.2 ls in ochre.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="d4"
            title="04 · Almanac"
            subtitle="Atlas as a year-at-a-glance. Time is the spine; destinations are chapters."
          >
            <DCArtboard id="almanac" label="Almanac" width={415} height={870} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
                <VariantAlmanac/>
              </div>
            </DCArtboard>
            <DCArtboard id="almanac-notes" label="Design logic" width={420} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 04" title="The atlas as a personal almanac.">
                <Note italic>“Where I’ve been, where I’m going.” The whole screen pivots around a vertical year-spine.</Note>
                <Note><b>Year ribbon</b> — 12 months tick down the left margin. Solid dot for trips taken, hollow ochre ring for planned, breath-mark dot for empty months. The current month gets a halo + “NOW” marker so the user can find themselves instantly.</Note>
                <Note><b>Title block</b> — the year (’26) is the headline; “2 trips · 1 ahead” is the only metric. Reads like a yearbook spine.</Note>
                <Note><b>Chapters</b> — the four destinations move to a single pill at the bottom of the page, numbered I–IV, with one tiny number under each. Familiar, scannable, but it stops competing with the timeline for attention.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Ribbon row 26 h · month caps 9.5 / 1.6 ls · NOW dot 9 px with 4 px gold halo (18% alpha) · chapter pill radius 18 · roman numerals serif italic 13 in ochre · destination label 16 / -0.2.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="d5"
            title="05 · Passport"
            subtitle="A passport interior. Bearer page on top; destinations are stamps."
          >
            <DCArtboard id="passport" label="Passport" width={415} height={870} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
                <VariantPassport/>
              </div>
            </DCArtboard>
            <DCArtboard id="passport-notes" label="Design logic" width={420} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 05" title="The atlas as a passport interior.">
                <Note italic>“Something I’d carry in my pocket.” The screen looks issued, numbered, official-in-a-quiet-way.</Note>
                <Note><b>Guilloché ground</b> — a 40% hatched grid sits at 12% opacity behind everything, the way travel-document paper does. Gives the screen real weight without a “texture image.”</Note>
                <Note><b>Bearer block</b> — the user’s name + bio in a gold-ruled card, with NO · 047 as a small angled seal. Tiny tabular row: ISSUED · STAMPS · PACE. Replaces the avatar/“profile” mark entirely — you are the bearer, not a user.</Note>
                <Note><b>Resident stamps</b> — the four destinations become a 2×2 of <i>actual stamps</i>, gently rotated, two circular and two rectangular. Each carries a tiny mono code (“03 / NEW”, “VOL · III”, “— BARE —”). Postcards is dashed/muted because the shelf is empty — empty-state is honest, not loud.</Note>
                <Note><b>Footer notation</b> — “NEXT STAMP · TOKYO · MAY ’26” in margin-note caps, hinting at the future without a CTA button.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Hatch pattern 22 px @ 0.4 px stroke / 12% alpha · bearer card 0.8 px ochre rule · stamps rotated ±2–3.5° · circular stamps aspect 1/1 · mono codes JetBrains 8.5 / 1.2 ls in 0.6 px box.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="d6"
            title="06 · Letter"
            subtitle="A short note from Vesper. The destinations are inline footnotes + enclosures."
          >
            <DCArtboard id="letter" label="Letter" width={415} height={870} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
                <VariantLetter/>
              </div>
            </DCArtboard>
            <DCArtboard id="letter-notes" label="Design logic" width={420} height={870} bg="transparent">
              <Logic eyebrow="DIRECTION 06" title="Atlas as a letter you can open.">
                <Note italic>“Vesper writes you in.” The most prose-forward of the six — closer to a literary reading app than a navigation screen.</Note>
                <Note><b>Salutation</b> — “Dear <i>Tiger</i>,” in 44 px serif. That single line carries identity, voice, and date all at once — replaces the cramped profile area entirely.</Note>
                <Note><b>The body</b> — two short paragraphs of italic-leaning prose, written in Vesper’s voice. Inside the text, four <i>roman-numeral superscripts</i> link to the destinations — they’re footnotes, the user has to choose to follow them.</Note>
                <Note><b>Enclosures</b> — under an ENCLOSED · FOUR hairline, the destinations sit as letter-paper rows: roman numeral, mark, name + italic descriptor, and a tiny mono action chip (OPEN / 14 / READ / BEGIN). Footnote-to-attachment is the whole interaction.</Note>
                <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b style={{ color: T.ink }}>Implementation</b><br/>
                  Body serif 17.5 / 1.45 lh / -0.1 ls · superscript serif italic 11 in ochre · enclosure row 10 px v-pad · mark 44 px · meta chip mono 9 / 1.4 ls inside 0.6 px box.
                </div>
              </Logic>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="d3-flow"
            title="03 · The full flow"
            subtitle="Direction 03 has its own canvas — ten screens, including profile, search and add."
          >
            <DCArtboard id="d3-link" label="Open the 03 canvas" width={560} height={420} bg="#F1ECE2">
              <div style={{ padding: 32, fontFamily: T.sans, color: T.inkSoft }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>DIRECTION 03 · EXPANDED</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 32, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, margin: '8px 0 14px', color: T.ink }}>
                  Ten screens,<br/><em>their own room.</em>
                </h2>
                <p style={{ margin: '0 0 18px', fontSize: 13.5, lineHeight: 1.55, maxWidth: 460 }}>
                  Home (full + cold start), the desk opened into a draft detail, the four rooms
                  (Inbox · Map · Travel DNA · Postcards), and the three top-bar destinations
                  (Profile · Search · Add). The Almanac timeline is stitched into Home and Map.
                </p>
                <a href="Atlas Direction 03.html" style={{
                  display: 'inline-flex', alignItems: 'center', gap: 8,
                  padding: '10px 16px', background: '#FBF7EC',
                  border: `0.8px solid ${T.gold}`, borderRadius: 999,
                  color: T.ink, textDecoration: 'none', fontSize: 13, fontWeight: 500,
                  letterSpacing: -0.1,
                }}>
                  Open the 03 canvas
                  <span style={{ color: T.goldDeep }}>→</span>
                </a>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="rec"
            title="Recommendation"
            subtitle="What I’d ship, and where to take each direction next."
          >
            <DCArtboard id="rec-card" label="Recommendation" width={860} height={740} bg="#F1ECE2">
              <div style={{ padding: '44px 44px', fontFamily: T.sans, color: T.inkSoft, fontSize: 14, lineHeight: 1.55, height: '100%' }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>RECOMMENDATION</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 40, fontWeight: 500, letterSpacing: -0.8, lineHeight: 1.05, color: T.ink, margin: '8px 0 8px' }}>
                  Ship <em>03 · Artifact-first.</em>  Steal from 02, 05 &amp; 06.
                </h2>
                <p style={{ maxWidth: 720, margin: '0 0 18px' }}>
                  The brief says the screen should “feel like a gift, not an empty dashboard.”
                  Direction 03 still solves the empty-state most honestly — Vesper drafts an
                  object for you. Of the new three, <b>06 · Letter</b> is the strongest
                  challenger: it gives Vesper a real voice. The other two (Almanac, Passport)
                  read as beautiful one-offs but lock the room into a single metaphor.
                </p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginTop: 8 }}>
                  {[
                    { t: '01 · Refined',   d: 'Safest. Native-first, editorial-second. Engineering fallback.' },
                    { t: '02 · Editorial', d: 'Strongest identity, weakest scan-ability. Donate its masthead + pull-quote to 03.' },
                    { t: '03 · Artifact',  d: 'Recommended. Hero object + asymmetric shelf. Works at zero state and at 200 postcards.' },
                    { t: '04 · Almanac',   d: 'Best for users who care about time. Could live as a secondary tab inside Map.' },
                    { t: '05 · Passport',  d: 'Most “collectible.” Risk: leans hard on one metaphor. Borrow its bearer-block into 03 in place of the avatar.' },
                    { t: '06 · Letter',    d: 'Most emotional. Strongest challenger to 03. Consider for a weekly digest moment instead of the home screen.' },
                  ].map((c, i) => (
                    <div key={i} style={{
                      background: '#FBF7EC', borderRadius: 10, padding: '16px 16px',
                      border: i === 2 ? `0.8px solid ${T.gold}` : '0.5px solid rgba(27,23,20,0.07)',
                      fontSize: 12.5,
                    }}>
                      <div style={{ fontFamily: T.serif, fontSize: 16, fontWeight: 500, color: T.ink, letterSpacing: -0.2 }}>{c.t}</div>
                      <div style={{ fontSize: 11.5, color: T.mute, marginTop: 5, lineHeight: 1.5 }}>{c.d}</div>
                    </div>
                  ))}
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 22, paddingTop: 16 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 6 }}>NEXT STEPS</div>
                  <ol style={{ margin: 0, paddingLeft: 18, display: 'grid', gap: 4, fontSize: 13 }}>
                    <li>Decide on the headline rule (literal week summary vs. signed-author voice).</li>
                    <li>Define the artifact draft rules: what does Vesper put on the desk on day one, day 30, day 300?</li>
                    <li>Confirm whether 4 rooms is fixed or if Atlas grows new destinations (e.g. Routes, People, Wishlist) — affects shelf layout.</li>
                  </ol>
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
