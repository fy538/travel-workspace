# Surface manifest — canon ↔ code correspondence ledger.
#
# One row per product surface. Maps the design canon files that define it to
# the travel-app code that implements it, plus the handoff number it was last
# verified aligned against. `scripts/canon-drift-check.py` reads this file:
# when a new handoff changes a `canon` path, every surface referencing that
# path gets flagged stale — regardless of what `status` says — so staleness
# is never hand-tracked, only hand-cleared after a real re-verify.
#
# Repo root for `code` paths: ~/travel-workspace/travel-app, unless a path is
# prefixed "travel-agent:" — some surfaces (e.g. Universal Search) have real
# backend work too; the prefix disambiguates which repo to open.
# Repo root for `canon` paths: ~/travel-workspace/design/vesper-canon-anchor/project
#
# status values:
#   aligned   — verified against `aligned_at`, no known gaps
#   partial   — verified, but a specific known gap/bug is open (see notes)
#   gap       — a real design/code disagreement exists, needs adjudication
#   deferred  — deliberately not aligning right now (off-wedge / not built)
#   unmapped  — canon surface exists; code correspondence not yet established
#     this session. NOT the same as "gap" — just means nobody's looked yet.
#
# `aligned_at: null` means never formally verified (unmapped/deferred rows).
# Editing rule: when you re-verify a surface, bump `aligned_at` to the
# handoff you checked it against and clear/update `notes` — don't just
# flip status without recording what you checked it against.

