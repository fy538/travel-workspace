<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Itinerary headers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="discover-styles.jsx"></script>
  <script type="text/babel" src="trip-home-kit.jsx"></script>
  <script type="text/babel" src="trip-itinerary.jsx"></script>
  <script type="text/babel" src="trip-itin-headers.jsx"></script>

  <script type="text/babel">
    const Phn = ({ children }) => <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>{children}</div>;
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: TH.gold, fontWeight: 600 }}>{children}</div>;
    function NoteCard({ eyebrow, title, children }) {
      return <div style={{ width: 320, padding: '22px 22px', background: '#F1ECE2', borderRadius: 8 }}>
        <EB>{eyebrow}</EB>
        <h3 style={{ fontFamily: TH.serif, fontSize: 21, fontWeight: 500, letterSpacing: -0.4, color: TH.ink, margin: '4px 0 10px' }}>{title}</h3>
        <p style={{ margin: 0, fontSize: 12.5, lineHeight: 1.5, color: TH.soft }}>{children}</p>
      </div>;
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.62}>
          <DCSection id="intro" title="Itinerary header · five takes" subtitle="The old header was a dark photo band labelled 'ITINERARY' that just repeated the trip title. These name the itinerary by what it is — a span of days — and mostly drop the heavy photo.">
            <DCArtboard id="why" label="The problem" width={420} height={300} bg="#F1ECE2">
              <div style={{ padding: '30px 28px', fontSize: 13, lineHeight: 1.55, color: TH.soft }}>
                <EB>WHY CHANGE IT</EB>
                <h2 style={{ fontFamily: TH.serif, fontSize: 24, fontWeight: 500, letterSpacing: -0.5, color: TH.ink, margin: '6px 0 12px' }}>Stop labelling, start naming.</h2>
                <p style={{ margin: 0 }}>A photo band + the word “ITINERARY” + the trip title (which you already know) is three kinds of redundant. The itinerary’s real identity is its <b>shape in time</b> — six days, how full they are, where today sits. Lead with that.</p>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="v" title="The five" subtitle="Each shown over the same two spine days.">
            <DCArtboard id="h1" label="1 · Span masthead" width={415} height={760} bg="transparent"><Phn><HdrSpan/></Phn></DCArtboard>
            <DCArtboard id="h1n" label="1 · notes" width={360} height={300} bg="transparent"><NoteCard eyebrow="1 · SPAN MASTHEAD" title="Six days.">No photo. The trip names itself by its length, with a planned-meter (“4 of 6 days sketched”). Calmest, most editorial, most honest about progress. My pick for the default.</NoteCard></DCArtboard>

            <DCArtboard id="h2" label="2 · Date rail" width={415} height={760} bg="transparent"><Phn><HdrRail/></Phn></DCArtboard>
            <DCArtboard id="h2n" label="2 · notes" width={360} height={300} bg="transparent"><NoteCard eyebrow="2 · DATE RAIL" title="The days are the nav.">The header is the top of the spine — a tappable week strip with a planned-dot under each day, today lit. Best wayfinding; lets you jump. Slightly more utilitarian.</NoteCard></DCArtboard>

            <DCArtboard id="h3" label="3 · Quiet bar" width={415} height={760} bg="transparent"><Phn><HdrQuiet/></Phn></DCArtboard>
            <DCArtboard id="h3n" label="3 · notes" width={360} height={300} bg="transparent"><NoteCard eyebrow="3 · QUIET BAR" title="Nearly disappears.">Type-only: back · “Lisbon · six days” · a tiny planned/booked count. The content carries everything. Best if the spine itself should be the star.</NoteCard></DCArtboard>

            <DCArtboard id="h4" label="4 · Boarding pass" width={415} height={760} bg="transparent"><Phn><HdrTicket/></Phn></DCArtboard>
            <DCArtboard id="h4n" label="4 · notes" width={360} height={300} bg="transparent"><NoteCard eyebrow="4 · BOARDING PASS" title="An object, not a bar.">A ticket stub — NYC → Lisbon, perforated, dates/nights/party. Tactile and a little playful; risks feeling gimmicky if every object does it. Great for the pre-departure moment specifically.</NoteCard></DCArtboard>

            <DCArtboard id="h5" label="5 · Folio tab" width={415} height={760} bg="transparent"><Phn><HdrFolioTab/></Phn></DCArtboard>
            <DCArtboard id="h5n" label="5 · notes" width={360} height={300} bg="transparent"><NoteCard eyebrow="5 · FOLIO TAB" title="A chapter of the folio.">Paper-on-paper folder tabs — The Days / Map / Costs / Story. Makes the itinerary feel like one chapter of the trip and lets you flick between deep objects without going home. Best for cross-object navigation.</NoteCard></DCArtboard>
          </DCSection>

          <DCSection id="take" title="A take" subtitle="">
            <DCArtboard id="rec" label="Recommendation" width={560} height={300} bg="#F1ECE2">
              <div style={{ padding: '32px 30px', fontSize: 13.5, lineHeight: 1.55, color: TH.soft }}>
                <EB>A TAKE</EB>
                <h2 style={{ fontFamily: TH.serif, fontSize: 25, fontWeight: 500, letterSpacing: -0.5, color: TH.ink, margin: '6px 0 12px' }}>Span masthead, with the folio tabs under it.</h2>
                <p style={{ margin: 0, maxWidth: 460 }}>Ship <b>1 · Span masthead</b> as the identity — “Six days” + planned-meter is calm, editorial, and honest. Borrow <b>5 · Folio tabs</b> as the row beneath it so you can flick to Map / Costs / Story without returning home. Keep <b>4 · Boarding pass</b> in your pocket for the 24h-before-departure moment, where the ticket metaphor actually earns itself.</p>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
