<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Trip Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="discover-styles.jsx"></script>

  <!-- home (phase) ecosystem · TH tokens -->
  <script type="text/babel" src="trip-home-kit.jsx"></script>
  <script type="text/babel" src="trip-home-variants.jsx"></script>
  <script type="text/babel" src="trip-home-redesign.jsx"></script>
  <script type="text/babel" src="trip-itinerary.jsx"></script>
  <script type="text/babel" src="trip-sheets.jsx"></script>
  <script type="text/babel" src="trip-map-story.jsx"></script>

  <!-- canonical-home (folio) ecosystem · DR tokens -->
  <script type="text/babel" src="trip-drafts-kit.jsx"></script>
  <script type="text/babel" src="trip-facets-rethink.jsx"></script>
  <script type="text/babel" src="trip-vblock-variants.jsx"></script>
  <script type="text/babel" src="trip-folio-body.jsx"></script>
  <script type="text/babel" src="trip-phases-folio.jsx"></script>
  <script type="text/babel" src="trip-create-v2.jsx"></script>
  <script type="text/babel" src="trip-editorial.jsx"></script>
  <script type="text/babel" src="trip-blank.jsx"></script>
  <script type="text/babel" src="trip-adaptive-home.jsx"></script>
  <script type="text/babel" src="trip-pickers-v2.jsx"></script>
  <script type="text/babel" src="trip-live.jsx"></script>
  <script type="text/babel" src="trip-live-itin.jsx"></script>
  <script type="text/babel" src="trip-live-abc.jsx"></script>
  <script type="text/babel" src="trip-posttrip.jsx"></script>
  <script type="text/babel" src="trip-posttrip-a.jsx"></script>

  <script type="text/babel">
    const Phn = ({ children }) => <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>{children}</div>;
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: TH.gold, fontWeight: 600 }}>{children}</div>;
    const H2 = ({ children }) => <h2 style={{ fontFamily: TH.serif, fontWeight: 500, fontSize: 27, letterSpacing: -0.7, lineHeight: 1.05, color: TH.ink, margin: '8px 0 14px' }}>{children}</h2>;
    const Note = ({ children }) => <p style={{ margin: '0 0 11px', fontSize: 13.5, lineHeight: 1.55, color: TH.soft }}>{children}</p>;
    function Spec({ children }) { return <div style={{ marginTop: 12, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: TH.mute, lineHeight: 1.5 }}>{children}</div>; }
    function Logic({ eyebrow, title, children, w = 440 }) {
      return <div style={{ width: w, padding: '34px 26px', background: '#F1ECE2', borderRadius: 8, color: TH.soft }}><EB>{eyebrow}</EB><H2>{title}</H2><div style={{ borderTop: `0.5px solid ${TH.hair}`, paddingTop: 14 }}>{children}</div></div>;
    }

    // Vesper-line state machine (folded from the facets tab).
    function VLineMachine() {
      const rows = [
        ['SOMETHING OPEN', 'B0853A', '“Three weeks out — the only gap left is where you sleep nights 5–7.”', 'logistics'],
        ['ALL SET', '3D7050', '“Everything’s booked. Now the good part — Lisbon’s warmest the week you land.”', 'anticipation'],
        ['ON THE TRIP', '3D5066', '“Day three. You’re due a slow morning before the others wake.”', 'in-the-moment'],
      ];
      return (
        <div style={{ width: 393, background: '#F1ECE2', borderRadius: 16, padding: '24px 22px' }}>
          <div style={{ fontSize: 10, letterSpacing: 2, color: '#86807A', fontWeight: 700, marginBottom: 12 }}>VESPER LINE, BY READINESS</div>
          {rows.map(([k, c, line, tag]) => (
            <div key={k} style={{ padding: '12px 0', borderTop: '0.5px solid rgba(27,23,20,0.06)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}><span style={{ width: 6, height: 6, borderRadius: 6, background: `#${c}` }}/><span style={{ fontSize: 8.5, letterSpacing: 1.3, color: '#86807A', fontWeight: 700 }}>{k} · {tag.toUpperCase()}</span></div>
              <p style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontStyle: 'italic', fontSize: 15, color: '#1B1714', margin: 0, lineHeight: 1.4, letterSpacing: -0.1 }}>{line}</p>
            </div>
          ))}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.52}>

          {/* ═══ THE CANONICAL HOME ═══ */}
          <DCSection id="home" title="Single-trip home · The Folio" subtitle="The consolidated home, in its two real states. Cover (chat · bell · trip-info) → one Vesper block on the place/itinerary → facet tiles carrying their own status → an intelligence slice (Vesper's cut, not the full spine). This is the pre-trip phase; live & memory follow below.">
            <DCArtboard id="home-needs" label="Needs you · a decision is open" width={455} height={1190} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><FolioBodyA/></div>
            </DCArtboard>
            <DCArtboard id="home-clear" label="All clear · nothing needs you" width={455} height={1290} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><FolioBodyB/></div>
            </DCArtboard>
            <DCArtboard id="home-notes" label="The system" width={430} height={980} bg="transparent">
              <Logic eyebrow="THE FOLIO · CONSOLIDATED" title="Nothing said twice." w={400}>
                <Note><b>Three icons, three domains</b> — chat (group talk), bell (trip events), trip-info (group + your alert prefs + admin). “Settings” reframed as trip admin, not a gear.</Note>
                <Note><b>One Vesper block</b> — Vesper speaks about the <i>place &amp; itinerary</i>, never logistics (the facets own that). It never just observes and dead-ends.</Note>
                <Note><b>Facet tiles carry the status</b> — Transport / Stay / Costs / Route. When a decision is open it enlarges to a hero; when all’s clear the map leads and Route is hidden.</Note>
                <Note><b>Intelligence slice, not the full spine</b> — Vesper’s phase-aware cut, with “Open the full itinerary →” to the real document. Home = intelligence, itinerary page = document.</Note>
                <Spec><b>Two states, one layout:</b> <b>Needs you</b> leads with the open decision as an enlarged facet hero; <b>All clear</b> leads with the map and a vibier Vesper line.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ POST-TRIP HOME · A variations (keepsake) ═══ */}
          <DCSection id="posttrip-final" title="Post-trip home · the keepsake page" subtitle="Direction A1, as a scrolling keepsake (not a glanceable screen): gouache cover → Vesper look-back → the story as a stamped postcard → the Atlas handoff right under it → the trip in brief (Stay · Map · Costs; Costs holds the settle-up, Transport dropped) → the moments you'll keep. Floating nav over it.">
            <DCArtboard id="post-page" label="The keepsake page (scrolls)" width={455} height={1040} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><PostTrip/></div></DCArtboard>
            <DCArtboard id="post-notes" label="What changed" width={420} height={620} bg="transparent">
              <Logic eyebrow="POST-TRIP · CANONICAL" title="A keepsake you browse.">
                <Note><b>It scrolls</b> — unlike the live home (one glanceable screen), the post-trip home is a page you linger on, so it runs taller than a viewport with the nav floating over it.</Note>
                <Note><b>The story is a postcard</b> — A1’s stamped, rotated artifact (Atlas’s “on your desk”); tap to read, and it can open into the film strip.</Note>
                <Note><b>Atlas under the artifact</b> — the handoff sits right beneath the story, as its consequence, not a pinned bar.</Note>
                <Note><b>The trip in brief</b> — Stay · Map · Costs (Transport dropped); the Costs card carries the one money moment, so settle-up lives in exactly one place.</Note>
                <Note><b>The moments you’ll keep</b> — the old “record” reframed: Vesper’s curated standouts with a thumb + day, not the full itinerary (that stays on the itinerary page) and not the photos (that’s the story).</Note>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ LIVE HOME · the itinerary, focused on now ═══ */}
          <DCSection id="livehome" title="Live home · during the trip" subtitle="Vesper's read on the day → the itinerary slice (a vertical timeline: what's transpired recedes above the NOW beat ✓, what's coming sits below, Vesper woven under the now title) → the logistics block (Stay · Next · Map) pinned above the floating nav. Emphasis shifts with the clock; the cinematic 'what now' moment lives in the Vesper tab.">
            <DCArtboard id="tod-morning" label="Morning · the day ahead" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><LiveThread tod="morning"/></div></DCArtboard>
            <DCArtboard id="tod-midday" label="Midday · now / next" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><LiveThread tod="midday"/></div></DCArtboard>
            <DCArtboard id="tod-evening" label="Evening · wind down + save the day" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><LiveThread tod="evening"/></div></DCArtboard>
            <DCArtboard id="lh-notes" label="How it works" width={420} height={620} bg="transparent">
              <Logic eyebrow="LIVE = FOLIO, ZOOMED" title="A timeline you stand inside.">
                <Note><b>Same heading</b> — the plan-phase Folio cover stays; only the dateline goes live (Day 3 · Tue · now).</Note>
                <Note><b>A real timeline</b> — the morning recedes <i>above</i> the NOW beat (struck + ✓), the rest of the day sits below, one continuous spine. Past is never below the present.</Note>
                <Note><b>Vesper under the now title</b> — woven right beneath “Lunch at Ramiro,” speaking to what’s happening now or about to (“no rush — they won’t turn the table”).</Note>
                <Note><b>The clock moves it</b> — morning the past is one line and the day’s ahead; by evening the past fills the screen and only dinner + “save today” remain.</Note>
                <Spec>Facets footer (tram · stay · costs · route) and “open the full day →” to the itinerary document. The ambient moment stays in the Vesper tab.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ ADAPTIVE HOME · NULL & PARTIAL STATES ═══ */}
          <DCSection id="adaptive" title="Start a new trip · land in the home" subtitle="Tapping + (not via Vesper) lands you in the single-trip home itself, in a null state — no pop-up creation page. You fill it by choosing a place, dates, or friends — any one, any order, none required. The home adapts to whatever's set.">
            <DCArtboard id="ah-null" label="1 · Blank — start anywhere" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><HomeNull/></div></DCArtboard>
            <DCArtboard id="ah-place" label="2 · Place only" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><HomePlace/></div></DCArtboard>
            <DCArtboard id="ah-dates" label="3 · Dates only (no place)" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><HomeDates/></div></DCArtboard>
            <DCArtboard id="ah-both" label="4 · Place + dates → becoming the Folio" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><HomePlaceDates/></div></DCArtboard>
            <DCArtboard id="ah-notes" label="How it adapts" width={420} height={720} bg="transparent">
              <Logic eyebrow="ADAPTIVE HOME" title="The home is the form.">
                <Note><b>No creation page</b> — “start a new trip” opens this home already, as a draft. The cover, Vesper line, and slots all stand in for what isn’t set yet.</Note>
                <Note><b>Start anywhere</b> — three optional slots (a place / dates / who). Tapping one opens a light picker; none are required to have a trip.</Note>
                <Note><b>Identity follows what’s set</b> — a place gives you the riso cover + title; dates-only gives a forming cover titled by the dates (“where to?”); nothing gives “A trip, taking shape.”</Note>
                <Note><b>It grows into the Folio</b> — once there’s a place <i>and</i> dates, the empty day-spine and “plan with Vesper” appear, and the facets (stay/transport) start to mean something. The same home, fuller.</Note>
                <Spec>Everything is fillable later and in any order; the draft autosaves. Vesper’s line always reflects the current state and nudges the most useful next thing — never scolds an empty field.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ THE LIGHT PICKERS · one row ═══ */}
          <DCSection id="pickers-final" title="The light pickers · place, dates, friends" subtitle="What each empty slot opens — light, editorial, not forms. Taste-led place · quick-shapes dates · invite-not-manage friends. Each writes straight back to the adaptive home.">
            <DCArtboard id="pf-place" label="Choose a place" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><PlaceList/></div></DCArtboard>
            <DCArtboard id="pf-dates" label="Choose dates" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><DatesShapes/></div></DCArtboard>
            <DCArtboard id="pf-friends" label="Invite friends" width={433} height={912} bg="transparent"><div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><FriendsList/></div></DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
