<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Illustration styles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="discover-styles.jsx"></script>

  <script type="text/babel">
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>{children}</div>;
    const H2 = ({ children }) => <h2 style={{ fontFamily: T.serif, fontWeight: 500, fontSize: 28, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '8px 0 14px' }}>{children}</h2>;
    const Note = ({ children }) => <p style={{ margin: '0 0 11px', fontSize: 13.5, lineHeight: 1.55, color: T.inkSoft }}>{children}</p>;

    // A style shown at three altitudes: hero, card, chip.
    function StyleBoard({ s }) {
      const { Comp } = s;
      return (
        <div style={{ width: 360, padding: '22px 22px 24px', background: '#F1ECE2', borderRadius: 8 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
            <h3 style={{ fontFamily: T.serif, fontSize: 24, fontWeight: 500, letterSpacing: -0.5, color: T.ink, margin: 0 }}>{s.name}</h3>
            <span style={{ fontFamily: T.mono, fontSize: 9, color: T.muteSoft, letterSpacing: 1 }}>{s.key.toUpperCase()}</span>
          </div>
          <div style={{ fontSize: 11.5, color: T.mute, marginTop: 4, marginBottom: 14 }}>{s.tag}</div>
          {/* hero */}
          <div style={{ borderRadius: 12, overflow: 'hidden' }}><Comp w={316} h={170}/></div>
          {/* card + chip row */}
          <div style={{ display: 'flex', gap: 12, marginTop: 12, alignItems: 'flex-end' }}>
            <div style={{ borderRadius: 10, overflow: 'hidden' }}><Comp w={150} h={92}/></div>
            <div style={{ borderRadius: 8, overflow: 'hidden' }}><Comp w={64} h={64}/></div>
            <div style={{ borderRadius: 999, overflow: 'hidden', width: 40, height: 40 }}><Comp w={40} h={40}/></div>
          </div>
          <div style={{ display: 'flex', gap: 14, marginTop: 12, fontSize: 9, letterSpacing: 1, color: T.muteSoft, fontWeight: 700 }}>
            <span>HERO</span><span style={{ marginLeft: 36 }}>CARD</span><span>CHIP</span><span>AVATAR</span>
          </div>
          <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 14, paddingTop: 12, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <div><div style={{ fontSize: 8.5, letterSpacing: 1.3, color: T.mute, fontWeight: 700 }}>MOOD</div><div style={{ fontFamily: T.serif, fontSize: 13, color: T.ink, marginTop: 3, fontStyle: 'italic' }}>{s.mood}</div></div>
            <div><div style={{ fontSize: 8.5, letterSpacing: 1.3, color: '#A04030', fontWeight: 700 }}>RISK</div><div style={{ fontFamily: T.serif, fontSize: 13, color: T.inkSoft, marginTop: 3, fontStyle: 'italic' }}>{s.risk}</div></div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.6}>
          <DCSection id="intro" title="Vesper · illustration styles" subtitle="The same Lisbon rooftop scene in four techniques, each shown hero → card → chip → avatar. Pick the house hand.">
            <DCArtboard id="brief" label="The question" width={600} height={520} bg="#F1ECE2">
              <div style={{ padding: '40px 34px', fontSize: 13.5, lineHeight: 1.55, color: T.inkSoft }}>
                <EB>ILLUSTRATION STRATEGY</EB>
                <H2>Technique is a brand decision.</H2>
                <Note>“House illustration” is a promise; the <b>technique</b> is what makes it ownable and gives the art team a spec. The rule we’re testing: <b>illustration for interpretation</b> (the read, the mood, Atlas memories), <b>photography for verification</b> (the specific bookable place).</Note>
                <Note>Each board shows one technique at four sizes — because the real test isn’t the hero, it’s whether it <i>survives shrinking</i> to a 40px avatar without turning to mud. The winner is legible at every altitude in one consistent hand.</Note>
                <div style={{ marginTop: 8, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  These are CSS/SVG approximations to judge <b>direction</b>, not final art. The chosen style would be drawn properly + tokenized (palette, grain, line-weight, time-of-day variants).
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="styles" title="Four techniques" subtitle="Same scene, same altitudes. Compare how each holds up from hero down to avatar.">
            <DCArtboard id="st-riso" label="Riso" width={404} height={520} bg="transparent"><div style={{ padding: '14px 22px' }}><StyleBoard s={STYLES[0]}/></div></DCArtboard>
            <DCArtboard id="st-etch" label="Etching" width={404} height={520} bg="transparent"><div style={{ padding: '14px 22px' }}><StyleBoard s={STYLES[1]}/></div></DCArtboard>
            <DCArtboard id="st-lino" label="Linocut" width={404} height={520} bg="transparent"><div style={{ padding: '14px 22px' }}><StyleBoard s={STYLES[2]}/></div></DCArtboard>
            <DCArtboard id="st-gouache" label="Gouache" width={404} height={520} bg="transparent"><div style={{ padding: '14px 22px' }}><StyleBoard s={STYLES[3]}/></div></DCArtboard>
          </DCSection>

          <DCSection id="rec" title="A take" subtitle="Where I'd land — and how to keep it from going generic.">
            <DCArtboard id="rec-card" label="Recommendation" width={620} height={460} bg="#F1ECE2">
              <div style={{ padding: '40px 34px', fontSize: 13.5, lineHeight: 1.55, color: T.inkSoft }}>
                <EB>A TAKE</EB>
                <H2>Riso hand, etching discipline.</H2>
                <Note><b>Riso</b> is the right emotional register for Vesper — warm, analog, crafted, sits perfectly on parchment. But it’s the busiest when small. So: <b>riso palette + grain at hero/card scale</b>, collapsing to <b>a single etched line mark at chip/avatar scale</b> — same ink, less ink. One hand, varied density.</Note>
                <Note>Keep it premium with three rules: <b>muted, limited palette</b> (2–3 inks max, drawn from the existing brick/blue/amber); <b>architectural, never whimsical</b> (no characters, no mascots); <b>time-of-day encodes meaning</b> (amber/day/dusk carries the read, not decoration).</Note>
                <div style={{ marginTop: 8, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                  <b>Long-tail fallback</b> — places we can’t hand-draw get a riso-toned treatment over a real photo (duotone + grain), so even un-illustrated places feel in-house. Decide this early; it shapes the content pipeline.
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
