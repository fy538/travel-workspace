<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Itinerary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="discover-styles.jsx"></script>
  <script type="text/babel" src="trip-home-kit.jsx"></script>
  <script type="text/babel" src="trip-itinerary-final.jsx"></script>
  <script type="text/babel" src="trip-itinerary-living.jsx"></script>
  <script type="text/babel" src="trip-itin-refined.jsx"></script>
  <script type="text/babel" src="trip-block-tap.jsx"></script>
  <script type="text/babel" src="trip-itin-rich.jsx"></script>
  <script type="text/babel" src="trip-place-page.jsx"></script>
  <script type="text/babel" src="trip-learn-more.jsx"></script>
  <script type="text/babel" src="trip-popover-variants.jsx"></script>

  <script type="text/babel">
    const Phn = ({ children }) => <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>{children}</div>;
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: TH.gold, fontWeight: 600 }}>{children}</div>;
    function NoteCard({ eyebrow, title, children, w = 380 }) {
      return <div style={{ width: w, padding: '34px 26px', background: '#F1ECE2', borderRadius: 8 }}>
        <EB>{eyebrow}</EB>
        <h3 style={{ fontFamily: TH.serif, fontSize: 24, fontWeight: 500, letterSpacing: -0.5, color: TH.ink, margin: '4px 0 12px' }}>{title}</h3>
        <div style={{ borderTop: `0.5px solid ${TH.hair}`, paddingTop: 13, fontSize: 13, lineHeight: 1.55, color: TH.soft }}>{children}</div>
      </div>;
    }
    const P = ({ children }) => <p style={{ margin: '0 0 11px' }}>{children}</p>;
    function Spec({ children }) { return <div style={{ marginTop: 6, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: TH.mute, lineHeight: 1.5 }}>{children}</div>; }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.62}>
          <DCSection id="intro" title="The Itinerary" subtitle="One itinerary object — a clean editorial day-spine — with a header that adapts to the situation. Consolidated and polished.">
            <DCArtboard id="model" label="The system" width={620} height={560} bg="#F1ECE2">
              <div style={{ padding: '40px 34px', fontSize: 13.5, lineHeight: 1.55, color: TH.soft }}>
                <EB>THE ITINERARY</EB>
                <h2 style={{ fontFamily: TH.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.8, lineHeight: 1.04, color: TH.ink, margin: '8px 0 14px' }}>One spine, a header that<br/>reads the situation.</h2>
                <P>The body is settled: a calm <b>editorial day-spine</b> — big date numerals anchoring a thread of moments, with booked / now / open states and group attributions. No grids, no dashboards.</P>
                <P>What changes is the <b>header</b>, by context:</P>
                <div style={{ display: 'grid', gap: 8, marginTop: 4 }}>
                  {[['DATE RAIL','a multi-day trip','jump across days; planned-dots show how full each is'],['QUIET BAR','a single-day trip','header nearly vanishes — the one day is the whole screen'],['TICKET BAND','24h before a flight / train','a live boarding pass rises atop the spine, then dissolves once you’ve gone']].map(([a,b,c])=>(
                    <div key={a} style={{ display: 'grid', gridTemplateColumns: '108px 1fr', gap: 12, padding: '9px 0', borderTop: `0.5px solid ${TH.hairThin}`, alignItems: 'baseline' }}>
                      <div style={{ fontSize: 9, letterSpacing: 1.2, color: TH.goldDeep, fontWeight: 700 }}>{a}</div>
                      <div><span style={{ fontFamily: TH.serif, fontStyle: 'italic', fontSize: 13.5, color: TH.ink }}>{b}</span><div style={{ fontSize: 11.5, color: TH.mute, marginTop: 2 }}>{c}</div></div>
                    </div>
                  ))}
                </div>
                <Spec>Replaces the old photo-band “ITINERARY” label. Maps live as the itinerary’s second face (Days⇄Map); Costs &amp; Story stay sibling objects, not tabs here.</Spec>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="rail" title="Multi-day · Date Rail" subtitle="The default. Tappable day chips with planned-dots; the polished spine below.">
            <DCArtboard id="rail-screen" label="Date rail" width={415} height={870} bg="transparent"><Phn><ItinRailHeader/></Phn></DCArtboard>
            <DCArtboard id="rail-notes" label="notes" width={400} height={500} bg="transparent">
              <NoteCard eyebrow="DATE RAIL" title="The days are the nav.">
                <P>Six day-chips, today filled dark with an amber dot, planned days carrying a gold dot, empty days a hollow ring — so you read the whole trip’s fullness at a glance. A month label + “4 days sketched” sits above.</P>
                <P>Below, the <b>polished spine</b>: cleaner node rhythm, group attributions shown inline (“Ana added this”), an honest open block (“this afternoon is bare — sketch it?”).</P>
                <Spec>Chip 11r · today shadow-lifted · date Cormorant 17 · spine node 6.5px (9 + halo for now) · booked = ink-blue, now = gold, gap = dashed ring.</Spec>
              </NoteCard>
            </DCArtboard>
          </DCSection>

          <DCSection id="quiet" title="Single-day · Quiet Bar" subtitle="A day trip needs no date rail. The header recedes; the one day fills the screen, richer.">
            <DCArtboard id="quiet-screen" label="Quiet bar" width={415} height={870} bg="transparent"><Phn><ItinQuietHeader/></Phn></DCArtboard>
            <DCArtboard id="quiet-notes" label="notes" width={400} height={500} bg="transparent">
              <NoteCard eyebrow="QUIET BAR" title="One day, room to breathe.">
                <P>For a single-day trip (a Sintra day, a city stopover), the date column would be noise. The header collapses to back · “A day in Sintra” · menu, and the day opens with an italic standfirst, then a fuller block list with finer detail (train times, what to do first).</P>
                <P>Same blocks, same booked/now states — just given the whole canvas.</P>
                <Spec>Header 56px hairline-divided · standfirst Cormorant italic 14 · no date numerals; the day is implicit.</Spec>
              </NoteCard>
            </DCArtboard>
          </DCSection>

          <DCSection id="ticket" title="Pre-departure · Ticket Band" subtitle="In the 24h before a flight or train, a live boarding pass rises atop the spine — then dissolves once you've travelled.">
            <DCArtboard id="ticket-screen" label="Ticket band" width={415} height={870} bg="transparent"><Phn><ItinTicketBand/></Phn></DCArtboard>
            <DCArtboard id="ticket-notes" label="notes" width={400} height={520} bg="transparent">
              <NoteCard eyebrow="TICKET BAND" title="The pass, when it matters.">
                <P>You liked the boarding-pass feeling — so it’s scoped to exactly when it earns its place: the <b>24h before a flight or train</b>. A dark riso-textured pass shows the route, time, gate, “Vesper checked you in · seat 14A,” and a Pass → action.</P>
                <P>Crucially it <b>sits atop the normal spine</b> (“and then — your first day”), not replacing it — and dissolves once the segment is flown, returning to the Date Rail. The same band serves trains for inter-city legs mid-trip.</P>
                <Spec>Pass on TH.ink + 16% riso · amber accents · perforated dashed rules · appears T-24h, auto-clears post-departure. Reusable per transport leg.</Spec>
              </NoteCard>
            </DCArtboard>
          </DCSection>
          <DCSection id="refined" title="The refined spine" subtitle="Changes 1–4: no banner, date-rail change-dots, one continuous spine (subtle past), and two quiet top-right icons — collapse + map.">
            <DCArtboard id="ref-full" label="Full spine · past→today→future" width={415} height={870} bg="transparent"><Phn><ItinRefinedFull/></Phn></DCArtboard>
            <DCArtboard id="ref-collapsed" label="Collapsed · daily index" width={415} height={870} bg="transparent"><Phn><ItinCollapsed/></Phn></DCArtboard>
            <DCArtboard id="ref-notes" label="notes" width={400} height={680} bg="transparent">
              <NoteCard eyebrow="REFINED SPINE" title="One document, two densities.">
                <P><b>1 · No banner.</b> Group changes are gone from a top banner — instead the <b>date rail carries an ink-blue dot</b> on any day with a pending change (“2 days have changes”). Notifications live on the dates.</P>
                <P><b>2 · Subtle past.</b> Past uses the <i>same</i> blocks, just at 0.5 opacity with a done-check or a soft strike on what you skipped — one continuous spine with a gradient of emphasis, not a separate diary layout.</P>
                <P><b>3 · Map as an icon.</b> Day/Map is a single top-right map icon that flips the whole itinerary to its Map face — not a segmented toggle.</P>
                <P><b>4 · Collapse.</b> A second top-right icon collapses the spine into a <b>daily index</b> — each day one line (summary + stop count + change dot); tap a day to expand just it, tap the icon to expand all. Two densities, one object.</P>
                <Spec>Rail change-dot 6px ink-blue · past 0.5 opacity + check/strike · icons: collapse (lines) + map · collapsed row 40px numeral + summary + chevron.</Spec>
              </NoteCard>
            </DCArtboard>
          </DCSection>

          <DCSection id="learn" title="Tapping a block · learn more" subtitle="Tap a block → the Dark Glass popover (quick actions + a tappable why-door) → a personalized place page that links out to the general dossier.">
            <DCArtboard id="lm-pop" label="Popover · Dark Glass" width={415} height={870} bg="transparent"><Phn><PopGlass/></Phn></DCArtboard>
            <DCArtboard id="lm-page" label="Personalized place page" width={415} height={870} bg="transparent"><Phn><PlaceForYou/></Phn></DCArtboard>
            <DCArtboard id="lm-flow" label="The flow" width={460} height={620} bg="transparent"><LearnFlow/></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
