<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Discover — the system</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="v3-shared.jsx"></script>
  <script type="text/babel" src="discover-kit.jsx"></script>
  <script type="text/babel" src="discover-read.jsx"></script>
  <script type="text/babel" src="discover-illus.jsx"></script>
  <script type="text/babel" src="discover-immersive.jsx"></script>
  <script type="text/babel" src="discover-sources.jsx"></script>
  <script type="text/babel" src="discover-feed.jsx"></script>
  <script type="text/babel" src="discover-feed-variants.jsx"></script>
  <script type="text/babel" src="discover-1.jsx"></script>
  <script type="text/babel" src="discover-search.jsx"></script>
  <script type="text/babel" src="discover-search-a.jsx"></script>
  <script type="text/babel" src="discover-search-b.jsx"></script>
  <script type="text/babel" src="discover-search-c.jsx"></script>
  <script type="text/babel" src="discover-search-blend.jsx"></script>
  <script type="text/babel" src="trips-shared.jsx"></script>
  <script type="text/babel" src="vesper-shared.jsx"></script>
  <script type="text/babel" src="vesper-modes.jsx"></script>

  <script type="text/babel">
    const Phn = ({ children }) => <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>{children}</div>;
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>{children}</div>;
    const H2 = ({ children }) => <h2 style={{ fontFamily: T.serif, fontWeight: 500, fontSize: 28, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '8px 0 14px' }}>{children}</h2>;
    function Note({ children }) { return <p style={{ margin: '0 0 11px', fontSize: 13.5, lineHeight: 1.55, color: T.inkSoft }}>{children}</p>; }
    function Spec({ children }) { return <div style={{ marginTop: 12, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute, lineHeight: 1.5 }}>{children}</div>; }
    function Logic({ eyebrow, title, children, w = 430 }) {
      return <div style={{ width: w, padding: '34px 26px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft }}><EB>{eyebrow}</EB><H2>{title}</H2><div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>{children}</div></div>;
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.5}>

          {/* ── 1 · THE MODEL ── */}
          <DCSection id="model" title="Discover · the system" subtitle="Vesper's read on the world — outside-in, sibling to Atlas. One frame, three sources, an illustrated read that adapts to where you are.">
            <DCArtboard id="map" label="Place → lens → dossier" width={920} height={640} bg="#F1ECE2">
              <div style={{ padding: 40, fontFamily: T.sans, color: T.inkSoft, fontSize: 13, lineHeight: 1.5 }}>
                <EB>THE MODEL</EB>
                <H2>One frame, three sources, an illustrated read.</H2>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, margin: '8px 0 22px' }}>
                  {[['PLACE','Lisbon → Alfama'],['LENS','the angle Vesper takes'],['DOSSIER','place × lens = one read']].map(([k,v],i)=>(
                    <React.Fragment key={k}>
                      <div style={{ flex: 1, padding: '14px 16px', background: '#FBF7EC', borderRadius: 12, border: `0.5px solid ${T.hairline}` }}>
                        <div style={{ fontSize: 9, letterSpacing: 1.6, fontWeight: 700, color: i===2?D.vesperDeep:T.mute }}>{k}</div>
                        <div style={{ fontFamily: T.serif, fontSize: 15, color: T.ink, fontWeight: 500, marginTop: 4, letterSpacing: -0.2 }}>{v}</div>
                      </div>
                      {i<2 && <span style={{ color: T.muteSoft, fontSize: 16 }}>→</span>}
                    </React.Fragment>
                  ))}
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 22 }}>
                  <div>
                    <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>THE SIX LENSES</div>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {['Why here','A day in','For the obsessed','Insider','The debate','Ritual'].map(l=>(
                        <span key={l} style={{ padding: '5px 10px', fontFamily: T.serif, fontSize: 12.5, color: D.vesperDeep, background: D.vesperSoft, borderRadius: 999, fontStyle:'italic' }}>{l}</span>
                      ))}
                    </div>
                    <Note><span style={{ fontSize: 12 }}><b>“The debate”</b> is a lens, not a page — the angle Vesper takes when a place has real tension. Every read resolves to a lensed dossier.</span></Note>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 8 }}>THREE SOURCES</div>
                    <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 7, fontSize: 12.5 }}>
                      <li><b style={{ color: D.vesperDeep }}>For you</b> — the world reordered through your taste.</li>
                      <li><b style={{ color: D.vesperDeep }}>Vesper</b> — the unfiltered canon; the house view.</li>
                      <li><b style={{ color: D.vesperDeep }}>Friends</b> — trusted people's real saves &amp; notes, attributed.</li>
                    </ul>
                    <Note><span style={{ fontSize: 12 }}>For you reorders · Vesper is canonical · Friends is human signal — never strangers or metrics.</span></Note>
                  </div>
                </div>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, marginTop: 8, paddingTop: 14 }}>
                  <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 10 }}>VESPER’S READ · ADAPTS BY CONTEXT</div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    {[['DREAM','no trip','outward'],['BRIEFING','pre-trip','prep'],['PROXIMITY','in-place','live'],['RETRO','just back','→ Atlas'],['DUAL','here ≠ trip','switch']].map(([a,b,c])=>(
                      <div key={a} style={{ flex: 1, padding: '11px 10px', background: '#FBF7EC', borderRadius: 10, border: `0.5px solid ${T.hairline}` }}>
                        <div style={{ fontSize: 9, letterSpacing: 1.2, fontWeight: 700, color: D.vesperDeep }}>{a}</div>
                        <div style={{ fontFamily: T.serif, fontSize: 12.5, color: T.ink, marginTop: 3, fontStyle:'italic' }}>{b}</div>
                        <div style={{ fontSize: 10, color: T.muteSoft, marginTop: 4, fontWeight: 600 }}>{c}</div>
                      </div>
                    ))}
                  </div>
                  <Note><span style={{ fontSize: 12 }}>Discover starts <b>outside-in</b> and tilts <b>inside-out</b> as a trip approaches and passes — proximity, then retrospective — before handing to Atlas.</span></Note>
                </div>
                <Spec><b>Voice &amp; surfaces</b> — parchment + ink + gold/earth accents · <b>violet only when Vesper speaks</b> (spark, lens, “the canon”) · house illustration gives every place one face, shared with Atlas · a read/section list stays <b>1–3, never 4</b>.</Spec>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── 2 · THE READ, ILLUSTRATED (primary pattern) ── */}
          <DCSection id="read" title="Vesper’s Read · illustrated" subtitle="The default. A house-style place illustration carries the feeling; a few annotated marks carry the meaning. Not a list, not a wall of text.">
            <DCArtboard id="read-illus" label="Annotated read" width={415} height={870} bg="transparent"><Phn><IllustratedRead/></Phn></DCArtboard>
            <DCArtboard id="read-portrait" label="Place portrait" width={415} height={870} bg="transparent"><Phn><PlacePortrait/></Phn></DCArtboard>
            <DCArtboard id="read-notes" label="The house style" width={440} height={870} bg="transparent">
              <Logic eyebrow="THE READ" title="Give every place a face.">
                <Note>List and paragraph both make you <i>work</i>. The default read is a <b>Vesper-drawn place illustration</b> with a one-line lead and a few <b>annotated pins</b> — tap a mark to open that lensed dossier.</Note>
                <Note>The illustration is a <b>house style</b>, not stock photography: warm tonal bands, inked rooflines, gold-lit windows, grain. The same hand as the Atlas cards — so a place feels consistent everywhere it appears (read hero, dossier hero, Atlas keepsake, place-chip crop).</Note>
                <Note><b>Place portrait</b> (middle) is the card form: illustration + name + a one-line characterization + lenses as chips.</Note>
                <Spec>Pin: 20px numbered violet bead + glassy label. Scene 216h hero / 150h portrait · time-of-day palettes · grain 50%. Words drop to one lead line.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── 3 · IMMERSIVE (Dream-shape variant) ── */}
          <DCSection id="immersive" title="The read · immersive variant" subtitle="The Dream shape (no trip, outward) at full bleed — when the job is to tempt, not to brief. The illustration fills the screen; one evocative line carries it.">
            <DCArtboard id="imm-home" label="Immersive home · first screen" width={415} height={870} bg="transparent"><Phn><ImmersiveHome/></Phn></DCArtboard>
            <DCArtboard id="imm-scroll" label="Immersive · scrolled down" width={455} height={1180} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><ImmersiveScroll/></div>
            </DCArtboard>
            <DCArtboard id="imm-dossier" label="Immersive dossier" width={415} height={870} bg="transparent"><Phn><ImmersiveDossier/></Phn></DCArtboard>
            <DCArtboard id="imm-notes" label="When to go immersive" width={440} height={870} bg="transparent">
              <Logic eyebrow="IMMERSIVE" title="When the job is desire.">
                <Note>The same house illustration, now <b>full-bleed</b> with a single soft top-to-bottom scrim (no loud gradient) and one evocative line — “Lisbon, after <i>the light goes amber</i>.” Glass segmented control floats on the image; a restrained <b>“Next, if this moves you”</b> pair teases without becoming a grid.</Note>
                <Note>This is the <b>Dream shape's variant</b>, not a separate direction — it’s what the read looks like when there's <i>no trip booked</i> and the work is to make you want to go. As a trip firms up, the read collapses back to the framed Briefing / Proximity shapes.</Note>
                <Note><b>Dossier</b> — a 408px immersive hero with the title low on the image, then the read on parchment with an italic hook. Save still means keeping the place into your world.</Note>
                <Spec>Hero 620h home / 408h dossier · single scrim, no gradient noise · glass controls blur 10px · hero title Cormorant 37/-1 · teasers 132h/14r · no influencer captions, no metrics.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── 4 · FIVE SHAPES ── */}
          <DCSection id="shapes" title="The read adapts · five shapes" subtitle="Same module, swapping by trip status × location. The illustrated read is the hero of each; supporting facts stay 1–3.">
            <DCArtboard id="s-dream" label="Dream · no trip" width={415} height={870} bg="transparent"><Phn><ReadDispatch/></Phn></DCArtboard>
            <DCArtboard id="s-brief" label="Briefing · pre-trip" width={415} height={870} bg="transparent"><Phn><ReadBriefing/></Phn></DCArtboard>
            <DCArtboard id="s-prox" label="Proximity · in-place" width={415} height={870} bg="transparent"><Phn><ReadProximity/></Phn></DCArtboard>
            <DCArtboard id="s-retro" label="Retrospective · just back" width={415} height={870} bg="transparent"><Phn><ReadRetro/></Phn></DCArtboard>
            <DCArtboard id="s-dual" label="Dual · here ≠ trip" width={415} height={870} bg="transparent"><Phn><ReadDual/></Phn></DCArtboard>
            <DCArtboard id="s-notes" label="Shape logic" width={430} height={870} bg="transparent">
              <Logic eyebrow="FIVE SHAPES" title="Context picks the shape.">
                <Note><b>Dream</b> (no trip) leads outward — cross-city picks. <b>Briefing</b> (pre-trip) scopes to your dates. <b>Proximity</b> (in-place) goes live with a “6 min on foot” chip. <b>Retrospective</b> (just back) hands a postcard to Atlas. <b>Dual</b> (here ≠ trip) adds a context switch.</Note>
                <Note>Each shape's hero is the illustrated read; any supporting facts are held to <b>1–3 lines</b>. The list is the exception, never the default.</Note>
                <Spec>Same warm card · header: spark + place (earth) + updated (mono). Stance colors: matters=violet · skip=mute · timely=green · near=ink-blue.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── 4 · THREE SOURCES ── */}
          <DCSection id="sources" title="For you · Vesper · Friends" subtitle="Three sources of 'outside', same place. The rail-pill control marks which is active.">
            <DCArtboard id="src-you" label="For you" width={415} height={870} bg="transparent"><Phn><SourceForYou/></Phn></DCArtboard>
            <DCArtboard id="src-vesper" label="Vesper" width={415} height={870} bg="transparent"><Phn><SourceVesper/></Phn></DCArtboard>
            <DCArtboard id="src-friends" label="Friends" width={415} height={870} bg="transparent"><Phn><SourceFriends/></Phn></DCArtboard>
            <DCArtboard id="src-notes" label="Sources logic" width={430} height={870} bg="transparent">
              <Logic eyebrow="THREE SOURCES" title="Three outsides, not three feeds.">
                <Note><b>For you</b> — the world reordered through your taste; “tune what Vesper weighs.”</Note>
                <Note><b>Vesper</b> — the canon, “whoever you are.” The only source that always shows <i>The debate</i>; no personalization chrome.</Note>
                <Note><b>Friends</b> — only people you've added. Their real saved places with <i>their</i> margin notes, attributed by avatar. No strangers, no likes, no counts.</Note>
                <Spec>The split that fixes the old blur: <b>For you reorders · Vesper is canonical · Friends is human</b>. Same rail-pill control across all three.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── 5 · READ + FEED (one scroll) ── */}
          <DCSection id="feed" title="Read + feed · one scroll" subtitle="The read is the masthead; the curated feed is the body. Only the top adapts — the feed stays, re-sectioned by context. Lists stay 1–3.">
            <DCArtboard id="feed-pretrip" label="Pre-trip · full scroll" width={455} height={2040} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><DiscoverScrollPretrip/></div>
            </DCArtboard>
            <DCArtboard id="feed-inplace" label="In-place · full scroll" width={455} height={2040} bg="transparent">
              <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 12 }}><DiscoverScrollInPlace/></div>
            </DCArtboard>
            <DCArtboard id="feed-notes" label="Feed logic" width={430} height={2040} bg="transparent">
              <Logic eyebrow="READ + FEED" title="The read frames; the feed carries.">
                <Note>Discover is <b>one scroll, two zones</b>: Vesper's Read masthead (adaptive), the curated feed body (stable). Scroll down and the feed is always there.</Note>
                <Note>The feed is <b>curated and finite</b> — named sections, a visible end (“that's what matters here — not everything”). A read or section list stays <b>1–3, never 4</b>. Sections re-label by context (“Worth the walk from Alfama” → “Within 10 minutes”) but the structure holds.</Note>
                <Spec>Feed row: 72² illustration + lens (violet) + serif title + “+ Vesper”. Lead card: 116h scene + lens chip. Hard end marker — never infinite.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── FEED CARD VARIATIONS ── */}
          <DCSection id="feedcards" title="Feed cards · variations" subtitle="Shapes the feed can mix. The Hero overlay restores the borderless title-on-image card. Same house illustration throughout.">
            <DCArtboard id="fc-hero" label="A · Hero overlay (borderless)" width={415} height={300} bg="transparent">
              <div style={{ padding: '16px 20px' }}><FeedHero v="hills" lens="For the obsessed" title="Lisbon, after the light goes amber" hook="The hour the whole city steps outside."/></div>
            </DCArtboard>
            <DCArtboard id="fc-cap" label="B · Captioned (no box)" width={415} height={300} bg="transparent">
              <div style={{ padding: '16px 20px' }}><FeedCaptioned v="coast" lens="A day in" title="Graça, before the morning fills it" hook="Coffee on the miradouro, then down the hill."/></div>
            </DCArtboard>
            <DCArtboard id="fc-split" label="C · Split (magazine)" width={415} height={240} bg="transparent">
              <div style={{ padding: '16px 20px' }}><FeedSplit v="alley" lens="Insider" title="The cervejaria locals still queue for" hook="No menu, eight euros, grilled fish." meta="LISBON · 3 MIN"/></div>
            </DCArtboard>
            <DCArtboard id="fc-quote" label="D · Quote dispatch" width={415} height={220} bg="transparent">
              <div style={{ padding: '16px 20px' }}><FeedQuote v="square" quote="Fado isn’t nightlife here; it’s closer to grief." place="LISBON"/></div>
            </DCArtboard>
            <DCArtboard id="fc-duo" label="E · Duo (either / or)" width={415} height={230} bg="transparent">
              <div style={{ padding: '16px 20px' }}><FeedDuo items={[{ v: 'coast', lens: 'A day in', title: 'Swim within the hour' }, { v: 'tiles', lens: 'Ritual', title: 'The tile museum, empty' }]}/></div>
            </DCArtboard>
            <DCArtboard id="fc-notes" label="When to use which" width={430} height={300} bg="transparent">
              <Logic eyebrow="FEED CARDS" title="A small, mixable set.">
                <Note><b>A · Hero overlay</b> — the borderless one. Title sits on the image, single soft scrim, no seam. The feed's punctuation — one per scroll, for the strongest read.</Note>
                <Note><b>B · Captioned</b> — image then caption on parchment, no card box. The quiet workhorse. <b>C · Split</b> — magazine column for a dense row. <b>D · Quote</b> — a Vesper line as the object. <b>E · Duo</b> — an either/or pair.</Note>
                <Spec>Mix, don't repeat: a scroll might open Hero, then Captioned + Split rows, a Quote to break rhythm, a Duo to close. Lens chip (violet) + “+ Vesper” stay constant.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── 6 · DOSSIER ── */}
          <DCSection id="dossier" title="The Dossier" subtitle="One place × one lens. A premium field note — illustrated hero, Vesper's thesis, a read worth saving.">
            <DCArtboard id="dossier-page" label="Dossier" width={415} height={870} bg="transparent"><Phn><D1Dossier/></Phn></DCArtboard>
            <DCArtboard id="dossier-notes" label="Dossier logic" width={440} height={870} bg="transparent">
              <Logic eyebrow="DOSSIER" title="A field note, not a blog post.">
                <Note>Full-bleed illustrated hero with the lens chip over it · drop-cap opener · a left-ruled <b>Vesper's thesis</b> · mono metadata (place · read · lens).</Note>
                <Note><b>Save</b> means keeping a place into your world (→ Atlas), not bookmarking content. <b>Ask Vesper</b> (violet) is the natural continuation of the read. No ratings, likes, or social metrics.</Note>
                <Spec>Sticky bar: “Save to your world” + violet <b>Ask Vesper</b> + share, over blurred parchment. Hero 300h · thesis 2px violet rule · body Cormorant 15.5/1.6.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── 8 · SEARCH (the blend: general + context-aware) ── */}
          <DCSection id="search" title="Search · general (A + B blend)" subtitle="Not scoped to a place — search reaches everything Vesper knows AND understands a typed desire. Vesper routes by query: a lookup gets clean structured groups (A); a fuzzy intent gets a violet ‘I read this as’ line + meaning groups (B), with a changeable context chip. Ask Vesper under every query.">
            <DCArtboard id="sx-empty" label="Empty · recents + prompt" width={415} height={870} bg="transparent"><Phn><SearchX_Empty/></Phn></DCArtboard>
            <DCArtboard id="sx-lookup" label="Typed · lookup (entity)" width={415} height={870} bg="transparent"><Phn><SearchX_Lookup/></Phn></DCArtboard>
            <DCArtboard id="sx-intent" label="Typed · intent (fuzzy)" width={415} height={870} bg="transparent"><Phn><SearchX_Intent/></Phn></DCArtboard>
            <DCArtboard id="sx-none" label="No results · reframed" width={415} height={870} bg="transparent"><Phn><SearchX_NoResults/></Phn></DCArtboard>
            <DCArtboard id="sx-dossier" label="Selecting a result · open" width={415} height={870} bg="transparent"><Phn><SearchB_Selected/></Phn></DCArtboard>
            <DCArtboard id="sx-notes" label="The blend logic" width={450} height={870} bg="transparent">
              <Logic eyebrow="SEARCH · A + B" title="One field. Vesper reads what you mean.">
                <Note><b>General, not place-scoped.</b> There’s no “searching within Lisbon” — the field reaches every place, read, venue and guide Vesper knows. A place is just one <i>kind</i> of result.</Note>
                <Note><b>Vesper routes by query.</b> A lookup (“tokyo”, “ramiro”) returns A’s clean structured groups — <b>Places · Reads · Places to go</b>, headed <i>“everywhere Vesper reads.”</i> A fuzzy desire (“fado but not touristy”) gets B’s <b>violet interpretation line</b> then meaning groups — <b>I’d start here · Places that match</b>.</Note>
                <Note><b>Context disambiguates, doesn’t cage.</b> Intent results carry a small changeable chip (<i>“Lisbon ▾”</i>) — Vesper uses where you are to read “fado” as Lisbon, but you can point it anywhere. Lookups ignore it entirely.</Note>
                <Note><b>Two exits.</b> Picking a city is a calm full-bleed <i>“Now reading Tokyo”</i> re-scope; picking a read/venue opens the dossier. <b>Ask Vesper</b> (violet) always sits under the results for “talk it through.”</Note>
                <Spec>Routing tell: entity tokens & known names → structured. Verbs, adjectives, “for/like/without”, or no match → interpreted. Ambiguous → show structured groups <i>with</i> a one-line interpretation on top. Empty state blends A’s recents (places + reads) with B’s “try asking.”</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ── 7 · BOUNDARY ── */}
          <DCSection id="boundary" title="Home vs Discover · the boundary" subtitle="Both have an adaptive Vesper hero. They rhyme, but never overlap in subject — one is about you, one is about there.">
            <DCArtboard id="b-home" label="Vesper Home · on a trip" width={415} height={870} bg="transparent"><Phn><VesperOnTrip/></Phn></DCArtboard>
            <DCArtboard id="b-disc" label="Discover · proximity" width={415} height={870} bg="transparent"><Phn><ReadProximity/></Phn></DCArtboard>
            <DCArtboard id="b-notes" label="Who owns what" width={460} height={870} bg="transparent">
              <Logic eyebrow="THE BOUNDARY" title="You, vs there.">
                <Note>They rhyme on purpose — both adaptive, both Vesper — but the <b>subject stays disjoint</b>. The tell: Home shows <i>your</i> plan; Discover shows the <i>place</i>.</Note>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 4 }}>
                  <div style={{ padding: 12, background: '#FBF7EC', borderRadius: 10, border: `0.5px solid ${T.hairline}` }}>
                    <div style={{ fontSize: 9, letterSpacing: 1.4, fontWeight: 700, color: '#B0853A' }}>VESPER HOME</div>
                    <div style={{ fontFamily: T.serif, fontSize: 14, color: T.ink, fontWeight: 500, margin: '5px 0 6px' }}>“For me, right now”</div>
                    <div style={{ fontSize: 11, color: T.mute, lineHeight: 1.45 }}>Your itinerary, your next hour. Bookings, decisions, your party. Ochre.</div>
                  </div>
                  <div style={{ padding: 12, background: '#FBF7EC', borderRadius: 10, border: `0.5px solid ${T.hairline}` }}>
                    <div style={{ fontSize: 9, letterSpacing: 1.4, fontWeight: 700, color: D.vesperDeep }}>DISCOVER</div>
                    <div style={{ fontFamily: T.serif, fontSize: 14, color: T.ink, fontWeight: 500, margin: '5px 0 6px' }}>“About there”</div>
                    <div style={{ fontSize: 11, color: T.mute, lineHeight: 1.45 }}>The world nearby, editorial — whether or not it's yours. Dossiers, the canon. Violet.</div>
                  </div>
                </div>
                <Spec>Discover never shows bookings, decisions, or travel-party. Home never shows a dossier or “the canon.” When in doubt — <b>Home is you, Discover is there.</b></Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
