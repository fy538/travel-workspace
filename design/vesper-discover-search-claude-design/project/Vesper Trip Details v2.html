<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1400"/>
  <title>Vesper · Trip detail pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
    .sec { padding: 40px 48px 8px; }
    .sec h2 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500; font-size: 34px; letter-spacing: -0.8px; color: #1B1714; margin: 0; }
    .sec p { font-size: 14px; color: #2C2622; line-height: 1.5; margin: 8px 0 0; max-width: 760px; }
    .sec .eb { font-size: 10.5px; letter-spacing: 2px; color: #B0853A; font-weight: 600; margin-bottom: 6px; }
    .row { display: flex; flex-wrap: wrap; gap: 28px; padding: 24px 48px 16px; }
    .cell { display: flex; flex-direction: column; gap: 10px; }
    .cap { font-size: 11px; letter-spacing: 1px; color: #86807A; font-weight: 600; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="discover-styles.jsx"></script>
  <script type="text/babel" src="trip-drafts-kit.jsx"></script>
  <script type="text/babel" src="trip-vblock-variants.jsx"></script>
  <script type="text/babel" src="trip-detail-pages.jsx"></script>
  <script type="text/babel" src="trip-stay-redesign.jsx"></script>
  <script type="text/babel" src="trip-stay-tap.jsx"></script>
  <script type="text/babel" src="trip-transport-redesign.jsx"></script>
  <script type="text/babel" src="trip-transport-combo.jsx"></script>
  <script type="text/babel" src="trip-traveler-detail.jsx"></script>
  <script type="text/babel" src="trip-costs-redesign.jsx"></script>
  <script type="text/babel" src="trip-costs-nav.jsx"></script>
  <script type="text/babel" src="trip-route-redesign.jsx"></script>

  <script type="text/babel">
    function Cell({ label, Comp }) {
      return (
        <div className="cell">
          <div style={{ transform: 'scale(0.82)', transformOrigin: 'top center', height: 700 }}><Comp/></div>
          <div className="cap">{label}</div>
        </div>
      );
    }
    function Sec({ eb, title, sub, items }) {
      return (
        <React.Fragment>
          <div className="sec"><div className="eb">{eb}</div><h2>{title}</h2><p>{sub}</p></div>
          <div className="row">{items.map(([l, C]) => <Cell key={l} label={l} Comp={C}/>)}</div>
        </React.Fragment>
      );
    }
    function App() {
      return (
        <div style={{ paddingBottom: 60 }}>
          <div style={{ padding: '40px 48px 0' }}>
            <div style={{ fontSize: 10.5, letterSpacing: 2, color: '#B0853A', fontWeight: 600 }}>VESPER · TRIP SURFACES</div>
            <h1 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 52, fontWeight: 500, letterSpacing: -1.4, margin: '6px 0 0', color: '#1B1714' }}>The four detail pages</h1>
            <p style={{ fontSize: 14, color: '#2C2622', maxWidth: 760, lineHeight: 1.5, marginTop: 10 }}>What each facet tile on the trip home opens into — Stay, Transport, Costs, Route — four variations each. Plain scroll, no canvas.</p>
          </div>
          <Sec eb="STAY · DAY SPINE + ACCOMMODATIONS" title="Stay — redesigned" sub="Date spine on the left, accommodations scoped to their nights on the right, each traveler's avatar on the hotel. V1 · together (with the unbooked gap) · V2 · the split · V3 · some undecided · and the popover that opens when you tap a stay."
            items={[['V1 · Together + gap', StayNew1], ['V2 · The split', StayNew2], ['V3 · Some undecided', StayNew3], ['Tap a stay · popover', StayTapPopover]]}/>
          <Sec eb="TRANSPORT" title="Transport" sub="Status-first page (two of three booked → getting there + heading home spines → between-cities + rental). 'By traveler' regroups in place: everyone by default, tap one to filter, ✕ to show all."
            items={[['The page · status-first', TransComboA], ['By traveler · everyone', ByTravelerAll], ['By traveler · filtered', ByTravelerOne]]}/>
          <Sec eb="COSTS" title="Costs" sub="Two faces — Balances (who owes whom) and the editorial Ledger — with the flows hanging off them: settle-up (Vesper-simplified), add-expense (payer · split · category · currency), tap a person → their breakdown, tap an expense → the split popover."
            items={[['Balances · the page', CostsBalances], ['The ledger', CostsV2], ['Settle up', CostsSettle], ['Add expense', CostsAdd], ['Person detail', CostsPerson], ['Tap an expense', CostsV3]]}/>
          <Sec eb="ROUTE · THE MAP IS THE HERO" title="Route" sub="The one spatial surface: an illustrated styled-tile map at three zooms (Trip / City / Day) + the live you-are-here state. Editorial pins, Vesper annotations, not a utility map."
            items={[['Trip shape · far', RouteTrip], ['City · your pins', RouteCity], ['Day’s path · near', RouteDay], ['Live · you-are-here', RouteLive]]}/>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
