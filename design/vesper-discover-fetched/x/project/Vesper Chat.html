<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="v3-shared.jsx"></script>
  <script type="text/babel" src="trips-shared.jsx"></script>
  <script type="text/babel" src="vesper-shared.jsx"></script>
  <script type="text/babel" src="vesper-chat-kit.jsx"></script>
  <script type="text/babel" src="vesper-chat-cards-a.jsx"></script>
  <script type="text/babel" src="vesper-chat-cards-b.jsx"></script>
  <script type="text/babel" src="vesper-chat-scaffold.jsx"></script>
  <script type="text/babel" src="vesper-chat-thread.jsx"></script>
  <script type="text/babel" src="vesper-chat-states.jsx"></script>
  <script type="text/babel" src="vesper-chat-in-thread.jsx"></script>
  <script type="text/babel" src="vesper-chat-group.jsx"></script>
  <script type="text/babel" src="vesper-chat-cross.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function Phn({ children }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'flex-start', height: '100%', paddingTop: 14 }}>
          {children}
        </div>
      );
    }
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>{children}</div>;
    const H2 = ({ children }) => <h2 style={{ fontFamily: T.serif, fontWeight: 500, fontSize: 27, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '8px 0 14px' }}>{children}</h2>;
    function Note({ children }) { return <p style={{ margin: '0 0 11px', fontSize: 13.5, lineHeight: 1.55, color: T.inkSoft }}>{children}</p>; }
    function Spec({ children }) { return <div style={{ marginTop: 12, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute, lineHeight: 1.5 }}>{children}</div>; }
    function Logic({ eyebrow, title, children, w = 440 }) {
      return <div style={{ width: w, padding: '34px 26px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft }}><EB>{eyebrow}</EB><H2>{title}</H2><div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 16 }}>{children}</div></div>;
    }

    const AB = (id, label, comp, w = 433, h = 884) => (
      <DCArtboard id={id} label={label} width={w} height={h} bg="transparent"><Phn>{comp}</Phn></DCArtboard>
    );

    function App() {
      return (
        <DesignCanvas title="Vesper · Chat" subtitle="An assistant’s desk — not a chatbot. One end-to-end system: the thread, every state, every card, private + group.">

          {/* ═══ THREAD LAYOUTS ═══ */}
          <DCSection id="threads" title="The thread · two layouts" subtitle="Vesper speaks as full-width serif prose with a + VESPER eyebrow (never a bubble); the user is a small dark serif pill. Editorial Scroll is the default; Document Edit takes over when iterating on a real draft.">
            {AB('t-ed', '1 · Editorial Scroll (default)', <ThreadEditorial/>)}
            {AB('t-doc', '2 · Document Edit (a real draft)', <ThreadDocument/>)}
            <DCArtboard id="t-notes" label="Layout logic + the switch" width={460} height={884} bg="transparent">
              <Logic eyebrow="THREAD · LOGIC" title="Two ways to talk to Vesper.">
                <Note><b>Editorial Scroll</b> (default) — the conversation as a serif column. Day dividers, the user’s dark pill, Vesper’s full-width prose, inline structured cards, italic suggested-action chips, quiet mono timestamps. Earlier turns stay full prose but read calm — no collapsing into bubbles.</Note>
                <Note><b>Document Edit</b> — when you’re iterating on a real artifact (itinerary, plan, list), the draft <i>becomes</i> the conversation. Edits show inline (ochre highlight = added phrasing, ink-blue underline = the open decision); your questions sit as <b>margin annotations</b> (2px ink-blue rule); Vesper’s next-draft reply offers <b>Keep · show both · undo</b> under a <b>DRAFT · vN</b> badge.</Note>
                <Spec><b>The switch.</b> Default to Editorial. Flip to Document the moment a turn <i>mutates a named draft</i> (“change day 4”, “make the list shorter”) — the draft rises to the top, prior chat folds into the margin as annotations. Flip back when the user asks something that isn’t an edit (“why this?”, “somewhere else?”). The header keeps the trip title; only the badge + body posture change.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ STATES ═══ */}
          <DCSection id="states" title="Every state" subtitle="Cold-start · composing + optimistic send + attachments · thinking (editorial ‘working’ copy that escalates, never raw tool chatter) · streaming with a caret · tool-result · error/retry · long thread. No typing dots, no AI orb.">
            {AB('s-cold', 'Cold start · starters', <StateCold/>)}
            {AB('s-comp', 'Composing · optimistic + photos', <StateComposing/>)}
            {AB('s-think', 'Thinking · escalating copy', <StateThinking/>)}
            {AB('s-stream', 'Streaming · prose + caret', <StateStreaming/>)}
            {AB('s-tool', 'Tool result + suggested next', <StateToolResult/>)}
            {AB('s-err', 'Error · calm recovery', <StateError/>)}
            {AB('s-long', 'Long thread · load earlier', <StateLong/>)}
            <DCArtboard id="s-notes" label="State machine" width={460} height={884} bg="transparent">
              <Logic eyebrow="STATES · LOGIC" title="Honest, calm, never mechanical.">
                <Note><b>Cold start</b> — a generous prompt + four starter chips, not onboarding homework. <b>Composing</b> shows the optimistic user pill at 55% with a SENDING clock; photo attachments (≤4) ride above the pill and the composer.</Note>
                <Note><b>Thinking</b> — editorial “working” copy, one line at a time. It <b>escalates</b>: at ~8s it explains <i>why it’s worth getting right</i>; at ~20s it deepens (“comparing a few I almost didn’t include”). Never raw tool names. Then prose <b>streams</b> in with a gold caret.</Note>
                <Note><b>Tool-result</b> cards settle inline and earn suggested-next chips. <b>Error</b> names what happened, reassures nothing was charged, and offers <b>Try again</b> + edit — calm, never alarming.</Note>
                <Spec><b>Long thread</b> — day dividers, a “↑ load earlier” pill, and a floating dark “↓ latest” affordance above the composer. Scroll position and draft text persist across the session.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ CARDS IN A TURN ═══ */}
          <DCSection id="cards" title="Card families, living in a turn" subtitle="The 15 chat-card kinds shown where they actually live — beneath Vesper’s prose, full-width, in 1:1. Reused from the card system, not standalone.">
            {AB('c-prep', 'Prepared · venue + day plan', <CardsPrepared/>)}
            {AB('c-decide', 'Decide · vote + booking proposal', <CardsDecide/>)}
            {AB('c-confirm', 'Confirm · receipt + change applied', <CardsConfirm/>)}
            {AB('c-live', 'Live · route + verify-before-booking', <CardsLive/>)}
            {AB('c-memory', 'Memory & voice · Atlas + voice segment', <CardsMemory/>)}
            {AB('c-explain', 'Explain · why-this + comparison', <CardsExplain/>)}
            {AB('c-careful', 'Narrate + careful · privacy + error', <CardsCareful/>)}
            <DCArtboard id="c-notes" label="Which cards own the body" width={460} height={884} bg="transparent">
              <Logic eyebrow="CARDS · LOGIC" title="Most sit beneath a note. Some are the voice.">
                <Note>Every card is introduced by a one-line Vesper note, then renders full-width beneath — never a standalone push. The note does the <i>judgement</i> (“I lean Sawanoya”); the card does the <i>structure</i>.</Note>
                <Note><b>Cards that own the body</b> (render their own prose, need no separate intro): <b>Narration</b>, <b>Atlas-draft</b>, <b>Rationale / “why this”</b>, <b>Voice-segment</b>. These <i>are</i> Vesper speaking, so a second intro would double up.</Note>
                <Note><b>Open directly</b> (no decision sheet): venue, route, receipt, change-applied, narration, voice. <b>Open a decision sheet</b> (a real call): decision/vote, booking-proposal, comparison, research/verify, privacy-handoff.</Note>
                <Spec>Colour discipline: ochre = Vesper’s authored intelligence; ink-blue = planning / add-to-trip / Open-in-Trips; oxblood = urgency only (a closing vote, a shifted flight). Money & confirmations stay ink/green, never gold.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ MODES ═══ */}
          <DCSection id="modes" title="Private 1:1 vs Group room" subtitle="1:1 is the asymmetric prose/pill grammar above. The group room gives members avatar pills and explicit public cards, while Vesper still writes prose to the group — with a dignified exception for anything private.">
            {AB('m-private', 'Private · the 1:1 grammar', <ThreadEditorial/>)}
            {AB('m-group', 'Group room · the object-types', <GroupRoom/>)}
            {AB('m-group2', 'Group · a stop added + paid', <GroupObjects/>)}
            <DCArtboard id="m-notes" label="Private ↔ group" width={460} height={884} bg="transparent">
              <Logic eyebrow="MODES · LOGIC" title="The same Vesper, two rooms.">
                <Note><b>Private 1:1</b> — header reads <code>PRIVATE · TRIP-LINKED</code> / <code>PRIVATE</code> / <code>JUST VESPER</code>. Asymmetric grammar: Vesper on the page, you as the dark pill. Taste is personal and explicit (“the light you keep saving”).</Note>
                <Note><b>Group room</b> — header is the trip + a member stack, composer says “Message the group”. Members speak in <b>avatar pills</b>; Vesper writes <b>prose attributed “to the group”</b> (still no bubble). Object-types: member message · public @Vesper question · a <b>decision</b> (public vote card) · a <b>plan-change</b> event · a <b>booking</b> event · the <b>dignified exception</b> — a private turn acknowledged (“just between us”) without exposing its content.</Note>
                <Spec><b>Privacy rule.</b> In group, personal taste depersonalises (“suits how you all travel”), budgets soften to ranges, and a 1:1 aside surfaces only as the dashed dignified-exception card. Promote group→private with the privacy-handoff card when a topic gets personal.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ CROSS-SURFACE + VOICE ═══ */}
          <DCSection id="cross" title="Cross-surface moments & voice" subtitle="The seams: a standalone thread becoming a real trip; in-thread handoffs to Trips and Atlas; and the two voice entries from chat. Home modes, takeovers, and the standalone Voice screens already exist — these only show the transitions.">
            {AB('x-promote', 'Promote · thread → a real trip', <PromoteToTrip/>)}
            {AB('x-handoff', 'Handoffs · add-to-trip · Atlas · Open-in-Trips', <Handoffs/>)}
            {AB('x-voicecalm', 'Voice · Calm Listening (one-shot)', <VoiceCalm/>)}
            {AB('x-voicetx', 'Voice · Editorial Transcript (session)', <VoiceTranscript/>)}
            <DCArtboard id="x-notes" label="Seams logic" width={460} height={884} bg="transparent">
              <Logic eyebrow="CROSS-SURFACE · LOGIC" title="Continuity, never a context-switch.">
                <Note><b>Promote</b> — a standalone Vesper thread becomes a real trip <i>mid-conversation</i>: a quiet ink-blue “NOW PLANNING Tokyo, in May” banner drops in, everything said carries over, and you stay in the thread.</Note>
                <Note><b>Handoffs</b> — add-to-trip and Open-in-Trips are <b>ink-blue</b> (planning); save-a-moment becomes an <b>Atlas postcard</b> (the Atlas-draft card) in gold. Each is a quiet event line or a card, never a modal.</Note>
                <Note><b>Voice</b> — the composer mic opens <b>Calm Listening</b> (one-shot: a breathing gold ring, your words as serif, replies land back in the thread). Long-press / “walk me through” opens the <b>Editorial Transcript</b> session — a live voice bar with an END · TO THREAD return.</Note>
                <Spec>Both voice modes return to the same thread they left; the transcript is saved as ordinary turns so the conversation stays one continuous record.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ SHIP RECOMMENDATION ═══ */}
          <DCSection id="ship" title="Ship recommendation" subtitle="">
            <DCArtboard id="ship-1" label="Default + state machine" width={470} height={620} bg="transparent">
              <Logic eyebrow="SHIP · 1" title="Default layout & the state machine." w={470}>
                <Note><b>Default:</b> Editorial Scroll. It carries 1:1 and group, every card, and every state without re-architecting — the prose-and-pill grammar is the product’s voice. Document Edit is a <i>mode</i> of it, not a separate screen.</Note>
                <Note><b>State machine:</b> idle → composing (optimistic) → thinking (escalating editorial copy at ~8s / ~20s) → streaming (caret) → settled (prose + cards + suggested-next). Errors branch off thinking/streaming into calm recovery; the draft and scroll position persist throughout.</Note>
                <Spec>Reduced-motion & accessibility: dynamic-type-safe (serif scales, mono timestamps hold), the caret and breathing ring are the only motion, both gated on prefers-reduced-motion.</Spec>
              </Logic>
            </DCArtboard>
            <DCArtboard id="ship-2" label="Private ↔ group + impl" width={470} height={620} bg="transparent">
              <Logic eyebrow="SHIP · 2" title="Private ↔ group & implementation." w={470}>
                <Note><b>Private ↔ group:</b> one engine, two render modes. 1:1 = Vesper-on-page + user pill, personal taste. Group = avatar pills + Vesper-prose-to-the-group + public cards + the dignified-exception for anything private. Promote between them with the privacy-handoff card.</Note>
                <Spec><b>Type</b> — Cormorant (prose/headings), DM Sans (UI/labels), JetBrains Mono (timestamps/facts). <b>Colour</b> — paper/ink; ochre = Vesper’s voice, ink-blue (#3D5066) = planning/Open-in-Trips, oxblood (#A04030) = urgency only. <b>Spacing</b> — 20px screen gutters, 14px turn rhythm, full-width cards inset to the gutter. <b>Motion</b> — 120ms pill send, caret blink, breathing voice ring; no typing dots, no orb, no chatbot tropes.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
