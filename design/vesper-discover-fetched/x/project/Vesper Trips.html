<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Trips — the full system</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="v3-shared.jsx"></script>
  <script type="text/babel" src="trips-shared.jsx"></script>
  <script type="text/babel" src="trips-home-states.jsx"></script>
  <script type="text/babel" src="trips-aux.jsx"></script>
  <script type="text/babel" src="trips-blank.jsx"></script>
  <script type="text/babel" src="trips-home-expand.jsx"></script>
  <script type="text/babel" src="trips-home-between.jsx"></script>
  <script type="text/babel" src="trips-home-system.jsx"></script>
  <script type="text/babel" src="trips-home-gaps.jsx"></script>
  <script type="text/babel" src="trips-loop.jsx"></script>
  <script type="text/babel" src="trips-loop2.jsx"></script>
  <script type="text/babel" src="trips-loop3.jsx"></script>

  <script type="text/babel">
    function Phn({ children }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100%' }}>
          {children}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas defaultZoom={0.5}>
          {/* ── COVER · the state machine ── */}
          <DCSection
            id="cover"
            title="Vesper · Trips — the system"
            subtitle="One composable home, ranked by a priority cascade — plus a + sheet, an all-trips index, and notifications. The states aren't separate screens; they're hero treatments the home chooses between by what's true right now."
          >
            <DCArtboard id="brief" label="System & state machine" width={1000} height={870} bg="#F1ECE2">
              <div style={{ padding: '44px 44px 32px', fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>VESPER · TRIPS · SYSTEM</div>
                <h1 style={{ fontFamily: T.serif, fontSize: 50, lineHeight: 0.96, letterSpacing: -1.3, fontWeight: 500, margin: '8px 0 14px', color: T.ink }}>
                  One home,<br/><em>composed each time.</em>
                </h1>
                <p style={{ margin: '0 0 18px', maxWidth: 740 }}>
                  The home isn’t one of five fixed screens — it’s a set of modular sections the home
                  <b> composes by what’s true right now</b>. The states below aren’t mutually exclusive
                  (you can be mid-trip <i>and</i> have drafts <i>and</i> a just-returned trip); they’re the
                  <b> hero treatments</b> the home picks between, with the other sections falling in below.
                </p>
                <div style={{ margin: '0 0 20px', padding: '13px 16px', background: '#FBF7EC', borderRadius: 10, border: `0.5px solid ${T.hairline}`, maxWidth: 740 }}>
                  <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: 1.6, color: T.goldDeep, fontWeight: 700, marginBottom: 6 }}>THE HERO CASCADE</div>
                  <div style={{ fontFamily: T.serif, fontSize: 15, color: T.ink, lineHeight: 1.5 }}>
                    on a trip now → <b>live</b> &nbsp;·&nbsp; else a trip soon → <b>countdown</b> &nbsp;·&nbsp; else just back → <b>Atlas bridge</b> &nbsp;·&nbsp; else drafts exist → <b>planning table</b> &nbsp;·&nbsp; else empty → <b>cold / dream</b>
                  </div>
                  <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 12.5, color: T.mute, marginTop: 7 }}>Below the hero, sections appear only when they have content: drafts rail · returned bridge · dream prompt · open-year ribbon. Each shows only if true.</div>
                </div>
                <p style={{ margin: '0 0 22px', maxWidth: 740 }}>
                  Below: each <b>hero treatment</b>, the + sheet, the all-trips index, and notifications.
                </p>

                {/* State machine — rows */}
                <div style={{
                  display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12,
                  borderTop: `0.5px solid ${T.hairline}`, paddingTop: 18,
                }}>
                  {[
                    { n: 'COLD',     ti: 'Where to?',         when: '0 upcoming dated trips',          notes: 'C · Dream Stack. Vesper carries the room. One dashed-gold first dream.' },
                    { n: 'DEFAULT',  ti: 'Your planning table.', when: '1–3 trips, one alive',         notes: 'A · Planning Table. Hero earns the page. Drafts scatter, bridge to Atlas.' },
                    { n: 'ON TRIP',  ti: 'You’re in Tokyo.',  when: 'between depart + return',         notes: 'Live hero. Today’s posture, three time-stamped cards, save-a-moment.' },
                    { n: 'RETURNED', ti: 'Lisbon, in your hands now.', when: 'first 14 days after return', notes: 'Atlas bridge is the hero. Postcard preview. Continuing plans below.' },
                    { n: 'FREQUENT', ti: 'Seven on the table.', when: '4+ drafts',                     notes: 'A’s hero + B’s serif-numeral rows in drafts. Unresolved bar still applies.' },
                  ].map((s, i) => (
                    <div key={s.n} style={{
                      background: '#FBF7EC', padding: '14px 14px', borderRadius: 12,
                      border: '0.5px solid rgba(27,23,20,0.08)',
                    }}>
                      <div style={{ fontSize: 9, letterSpacing: 1.8, color: TR.ink, fontWeight: 700 }}>
                        {String(i + 1).padStart(2, '0')} · {s.n}
                      </div>
                      <div style={{ fontFamily: T.serif, fontSize: 17, fontWeight: 500, color: T.ink, marginTop: 6, letterSpacing: -0.3, lineHeight: 1.1 }}>
                        {s.ti}
                      </div>
                      <div style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 11, color: T.mute, marginTop: 4 }}>
                        {s.when}
                      </div>
                      <div style={{ borderTop: `0.5px solid ${T.hairThin}`, marginTop: 10, paddingTop: 8, fontSize: 11, lineHeight: 1.4, color: T.mute }}>
                        {s.notes}
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{
                  display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18, marginTop: 22,
                  borderTop: `0.5px solid ${T.hairline}`, paddingTop: 18,
                }}>
                  <div>
                    <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 10 }}>VISUAL VOICES</div>
                    <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 8 }}>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: TR.ink, marginRight: 8, verticalAlign: 'middle' }}/><b>Ink-blue</b> · planning · dates · active state · primary CTAs</li>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: T.gold, marginRight: 8, verticalAlign: 'middle' }}/><b>Ochre</b> · Vesper’s voice · suggestions · Atlas handoff</li>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: TR.dreaming, marginRight: 8, verticalAlign: 'middle' }}/><b>Sage</b> · dreaming · ideas · pre-decision</li>
                      <li><span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 8, background: T.muteSoft, marginRight: 8, verticalAlign: 'middle' }}/><b>Mute</b> · paused · archived · metadata</li>
                    </ul>
                  </div>
                  <div>
                    <div style={{ fontSize: 10, letterSpacing: 2, color: T.mute, fontWeight: 600, marginBottom: 10 }}>CROSS-TAB BEHAVIOR</div>
                    <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'grid', gap: 6 }}>
                      <li><b>+ button</b> → Begin a trip (talk to Vesper · blank canvas · pick a shape)</li>
                      <li><b>🔔 bell</b> → Updates · sectioned by Live / Planning / Returned</li>
                      <li><b>→ Atlas</b> · auto-drafted postcard on every return</li>
                      <li><b>→ Discover</b> · saved places feed quick-starts &amp; Vesper ideas</li>
                      <li><b>→ Vesper</b> · the chat-style entry lives inside the + flow</li>
                    </ul>
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── HOMES ── */}
          <DCSection
            id="homes"
            title="The home · five states"
            subtitle="Same layout grammar, retuned per state. The bottom tab + safe area are identical across all five."
          >
            <DCArtboard id="home-cold"     label="Cold start (C)"   width={415} height={870} bg="transparent"><Phn><HomeCold/></Phn></DCArtboard>
            <DCArtboard id="home-default"  label="Default (A)"      width={415} height={870} bg="transparent"><Phn><HomeDefault/></Phn></DCArtboard>
            <DCArtboard id="home-on"       label="On a trip"        width={415} height={870} bg="transparent"><Phn><HomeOnTrip/></Phn></DCArtboard>
            <DCArtboard id="home-returned" label="Just returned"    width={415} height={870} bg="transparent"><Phn><HomeReturned/></Phn></DCArtboard>
            <DCArtboard id="home-frequent" label="Frequent (A + B)" width={415} height={870} bg="transparent"><Phn><HomeFrequent/></Phn></DCArtboard>
            <DCArtboard id="home-between" label="Between trips (nothing dated)" width={415} height={870} bg="transparent"><Phn><HomeBetween/></Phn></DCArtboard>
            <DCArtboard id="home-notes"    label="State logic"      width={460} height={900} bg="transparent">
              <div style={{
                width: 420, padding: '36px 28px', background: '#F1ECE2',
                borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55,
              }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>HOME · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>
                  How the home re-tunes.
                </h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}><b>Cold</b> — no dated trips. The deck-of-cards metaphor from Dream Stack collapses to one dashed-gold blank postcard. Vesper carries the room with three trending Discover ideas. Begin-one glyphs sit at the bottom.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Default</b> — the canvas state. Hero alive trip with four planning pieces. Drafts strip with 2–3 upright cards driven by status pills. A quiet typographic Atlas-bridge footer.</p>
                  <p style={{ margin: '0 0 12px' }}><b>On a trip</b> — between depart and return. The hero abandons planning pieces and shows <i>today</i>: a posture line (“you’re due for one quiet hour”), three time-stamped cards (NOW · AFTERNOON · TONIGHT), and a “Save a moment to Atlas” call.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Just returned</b> — first 14 days back. The Atlas bridge is promoted from footer to <i>hero</i>: a large postcard preview, “Send to Atlas” as the primary action. Continuing plans demoted to a quiet list below.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Frequent</b> — 4+ drafts. Hero stays the same but compacts (no planning grid). Drafts swap to B’s serif-numeral row pattern with month/day on the left and a status pill on the right.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Between trips</b> — nothing dated, but never empty. Led by the memory→intent loop (your taste → a Discover suggestion), then still-circling saves, friends out there, a read worth opening, and a postcard from Atlas. Dreaming as a first-class state.</p>
                  <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                    <b style={{ color: T.ink }}>Group trip</b> isn’t a separate state — it’s an overlay. Hero gains a collaborators row + an open-decisions chip in any state.
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── HOME · THE SYSTEM ── */}
          <DCSection
            id="system"
            title="The home · the system"
            subtitle="Dynamic isn't a free-for-all. The home re-composes by what's true now, but on a fixed vocabulary: one card grammar, a fixed set of sections (each appears on a rule), and the governing principles — laid out as a small design system rather than a loose canvas.">
            <DCArtboard id="sys-board" label="The home, as a system" width={1100} height={1480} bg="transparent">
              <HomeSystem/>
            </DCArtboard>
          </DCSection>

          {/* ── HOME · THE MISSING SURFACES ── */}
          <DCSection
            id="gaps"
            title="The home · the missing surfaces"
            subtitle="Four gaps the system implied but never drew — same card grammar (flat tiles, hairline, one hero, no stripes/dashes; oxblood for urgency only).">
            <DCArtboard id="gap-group" label="1 · Group / shared-trip overlay" width={415} height={870} bg="transparent"><Phn><GroupHome/></Phn></DCArtboard>
            <DCArtboard id="gap-urgent" label="2 · Urgent / needs-you" width={415} height={870} bg="transparent"><Phn><UrgentHome/></Phn></DCArtboard>
            <DCArtboard id="gap-tap" label="3 · Tap a trip → its home" width={415} height={870} bg="transparent"><Phn><TapHandoff/></Phn></DCArtboard>
            <DCArtboard id="gap-load" label="4 · Loading / offline" width={415} height={870} bg="transparent"><Phn><HomeLoading/></Phn></DCArtboard>
            <DCArtboard id="gap-notes" label="What these close" width={440} height={870} bg="transparent">
              <div style={{ width: 420, padding: '36px 28px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>GAPS · CLOSED</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 28, fontWeight: 500, letterSpacing: -0.6, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>What the system implied but didn’t draw.</h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}><b>1 · Group overlay.</b> A shared trip = the same home + a collaborators row under the title and an open-decisions block (“2 open · your call”). Not a separate state — an overlay on any state. This is Vesper’s coordination edge, finally on the home.</p>
                  <p style={{ margin: '0 0 12px' }}><b>2 · Urgent.</b> When something can’t wait, one <b>oxblood</b> needs-you hero pre-empts the calm home (dot, not stripe), the rest demoted to “…and 4 other things.” Oxblood is used here and nowhere else.</p>
                  <p style={{ margin: '0 0 12px' }}><b>3 · Tap-a-trip seam.</b> Tapping a trip on the global home opens its <i>own</i> single-trip home (a separate surface) — the pressed state + label make the handoff legible.</p>
                  <p style={{ margin: 0 }}><b>4 · Loading / offline.</b> “Vesper is shaping this…” (editorial copy + skeleton, no spinner); offline shows the last view with a quiet Retry — the home never assumes everything resolved.</p>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── THE CORE LOOP · INTERACTIVE ── */}
          <DCSection
            id="loop"
            title="The core loop · interactive"
            subtitle="The interactive proof, built on the designed group home (no new paradigm) — it's the shared-trip 'Lisbon table' with its DECISIONS overlay made live. Tap a choice: the votes record, the hero re-reads from 'decisions waiting' to 'all settled', and a confirmation appears. Tap it.">
            <DCArtboard id="loop-live" label="Group home · vote in place (live)" width={415} height={870} bg="transparent"><Phn><TripsLoop/></Phn></DCArtboard>
            <DCArtboard id="loop-adaptive" label="Blank home · fill a slot (live)" width={415} height={870} bg="transparent"><Phn><AdaptiveLoop/></Phn></DCArtboard>
            <DCArtboard id="loop-urgent" label="Urgent → resolve (live)" width={415} height={870} bg="transparent"><Phn><UrgentLoop/></Phn></DCArtboard>
          </DCSection>

          {/* ── + CREATE TRIP ── */}
          <DCSection
            id="create"
            title="Create · begin a trip"
            subtitle="The + opens a full Begin-a-trip page (a considered threshold, not a quick modal): a hero ask, two doors (talk to Vesper / start blank), a shape carousel, and the Discover bridge. Back chevron top-left."
          >
            <DCArtboard id="create-mock" label="+ sheet · begin a trip" width={415} height={870} bg="transparent"><Phn><TripsCreate/></Phn></DCArtboard>
            <DCArtboard id="create-notes" label="Logic" width={440} height={870} bg="transparent">
              <div style={{
                width: 420, padding: '36px 28px', background: '#F1ECE2',
                borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55,
              }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>+ · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>
                  Two doors in, six shapes inside.
                </h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Talk it through with Vesper</b> — ochre primary, RECOMMENDED chip. Tapping
                    routes into the Vesper tab pre-seeded with a “new trip” thread and a placeholder
                    prompt (<i>“a quiet week in september, somewhere coastal…”</i>). Outside of scope here.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Start with a blank page</b> — ink-blue secondary. Opens the single-trip home
                    in a null state (see <i>“Start blank · the home is the form”</i> below) — no pop-up,
                    you fill place / dates / who in any order.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Six shapes</b> — City / Beach / Mountain / Road / Festival / Quiet. Pre-seed
                    the blank canvas with a default itinerary skeleton + Vesper personality (e.g.
                    Quiet skips the agenda grid). Each glyph is restrained line-art, not the saturated
                    blue icons from the current screen.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Continue from Discover</b> — surfaces if the user has saved Discover items.
                    Tapping pivots into a “build a trip around these places” flow. The bridge from
                    Discover into Trips.
                  </p>
                  <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                    <b style={{ color: T.ink }}>Why two paths, not one</b><br/>
                    Some users want to type. Others want to think out loud. Forcing one mode loses
                    the other — and the two doors create a clear product hierarchy: Vesper is
                    primary, blank is the escape valve.
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── START BLANK · the home is the form ── */}
          <DCSection
            id="blank"
            title="Start blank · the home is the form"
            subtitle="What 'start with a blank page' opens — not a creation pop-up, but the single-trip home itself, in a null state. You fill it by tapping a place / dates / who, in any order. The home adapts to what's set; each slot opens a light picker."
          >
            <DCArtboard id="bl-null" label="1 · Blank — start anywhere" width={415} height={912} bg="transparent"><Phn><BlankNull/></Phn></DCArtboard>
            <DCArtboard id="bl-place" label="2 · Place only" width={415} height={912} bg="transparent"><Phn><BlankPlace/></Phn></DCArtboard>
            <DCArtboard id="bl-dates" label="3 · Dates only" width={415} height={912} bg="transparent"><Phn><BlankDates/></Phn></DCArtboard>
            <DCArtboard id="bl-both" label="4 · Place + dates → becoming the Folio" width={415} height={912} bg="transparent"><Phn><BlankBoth/></Phn></DCArtboard>
            <DCArtboard id="bl-pick-place" label="Picker · a place" width={415} height={912} bg="transparent"><Phn><PickPlaceT/></Phn></DCArtboard>
            <DCArtboard id="bl-pick-dates" label="Picker · dates" width={415} height={912} bg="transparent"><Phn><PickDatesT/></Phn></DCArtboard>
            <DCArtboard id="bl-pick-who" label="Picker · who" width={415} height={912} bg="transparent"><Phn><PickFriendsT/></Phn></DCArtboard>
            <DCArtboard id="bl-notes" label="Blank-page logic" width={440} height={912} bg="transparent">
              <div style={{ width: 420, padding: '36px 28px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>BLANK · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>The home is the form.</h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}><b>No creation pop-up.</b> “Start with a blank page” (from Create) lands you in the single-trip home already — as a draft. The cover, Vesper line, and three slots stand in for what isn’t set yet.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Start anywhere.</b> Three optional slots — a place / dates / who — in any order, none required. The cover and Vesper’s line re-tune as each fills (place gives it a face; dates alone → “where shall we point them?”).</p>
                  <p style={{ margin: '0 0 12px' }}><b>Light pickers, not forms.</b> Each slot opens a taste-led picker — saved places, quick date-shapes + a calendar, recent companions to invite.</p>
                  <p style={{ margin: 0 }}><b>It becomes the Folio.</b> Once a place + dates are set, the empty day-spine appears and the draft graduates into the real single-trip home (Vesper Trip Home).</p>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── ALL TRIPS · the index ── */}
          <DCSection
            id="index"
            title="All trips · the index"
            subtitle="A destination, not a home state, reached from the 'ALL TRIPS ›' link in the top bar (present in every home state). The home stays curated ('what's alive now'); this is the full shelf — Planning (dated) and Dreaming (drafts), with small scene thumbnails. Atlas owns the past, so returned trips graduate there and the index just links across."
          >
            <DCArtboard id="index-mock" label="All trips" width={415} height={870} bg="transparent"><Phn><TripsIndex/></Phn></DCArtboard>
            <DCArtboard id="index-notes" label="Index logic" width={440} height={870} bg="transparent">
              <div style={{ width: 420, padding: '36px 28px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>INDEX · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>Where every trip lives.</h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}><b>Atlas owns the past; Trips owns present + future + drafts.</b> A returned trip lingers in the home’s <i>Returned</i> hero for ~2 weeks, then graduates to Atlas as a kept memory — so the index never becomes a graveyard.</p>
                  <p style={{ margin: '0 0 12px' }}><b>Two live groups.</b> <i>Planning</i> — dated, future (alive / pencilled). <i>Dreaming</i> — no dates yet (drafts, dream-seeds). Reached from a quiet “All trips” affordance on the home.</p>
                  <p style={{ margin: 0 }}><b>The home vs the index.</b> The home is the <i>now</i> surface — one hero + what’s relevant. The index is the <i>complete</i> list, for when you want to see everything at once.</p>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── NOTIFICATIONS ── */}
          <DCSection
            id="notif"
            title="Notifications · updates"
            subtitle="Sectioned by the trip state: Live · Planning · Returned. No global feed, no marketing pushes."
          >
            <DCArtboard id="notif-mock" label="Updates" width={415} height={870} bg="transparent"><Phn><TripsNotifications/></Phn></DCArtboard>
            <DCArtboard id="notif-notes" label="Logic" width={440} height={870} bg="transparent">
              <div style={{
                width: 420, padding: '36px 28px', background: '#F1ECE2',
                borderRadius: 8, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55,
              }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600, marginBottom: 10 }}>🔔 · LOGIC</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 30, fontWeight: 500, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '0 0 16px' }}>
                  Only what the trip is doing.
                </h2>
                <div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 14 }}>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Three sections, in trip-time order</b> — Live (currently on a trip), Planning
                    (decisions, collab, Vesper drafts), Returned (Atlas handoff, kept entries).
                    Mirrors the home-state machine exactly.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Each row has one source</b> — Vesper (ochre dot), a collaborator (ink-blue),
                    a system (mute). Source + relative time live in the metadata caption row, never
                    inside the title.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>One action per row</b> — OPEN · REVIEW · CONFIRM · VOTE · SEE. Mono-leaning
                    label in a thin rule, not a button. Returned-section actions get the ochre treatment
                    to bias the user toward Atlas.
                  </p>
                  <p style={{ margin: '0 0 12px' }}>
                    <b>Title posture</b> — “What changed, <i>since you looked.</i>” The page reads
                    as a quiet report, not a notification dump.
                  </p>
                  <div style={{ marginTop: 14, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute }}>
                    <b style={{ color: T.ink }}>What’s NOT here</b><br/>
                    Marketing pushes. App-update banners. Generic “check out new features.” Travel
                    deals. Bell only carries the user’s own trips — anything else lives in the Vesper
                    tab.
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ── RELATED CANVASES ── */}
          <DCSection
            id="lineage"
            title="Lineage & boundaries"
            subtitle="What folded into this canvas, and where it hands off."
          >
            <DCArtboard id="lineage-card" label="Lineage & boundaries" width={760} height={420} bg="#F1ECE2">
              <div style={{ padding: 40, fontFamily: T.sans, color: T.inkSoft, fontSize: 13.5, lineHeight: 1.6 }}>
                <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>LINEAGE & BOUNDARIES</div>
                <h2 style={{ fontFamily: T.serif, fontSize: 28, fontWeight: 500, letterSpacing: -0.6, color: T.ink, margin: '8px 0 16px' }}>One canvas now — the three directions, fused.</h2>
                <p style={{ margin: '0 0 12px' }}>This is the canonical global Trips home. The earlier three-direction study folded in here, one posture per state: <b>A · Planning Table</b> → the <i>Default</i> state (one alive trip as the hero object); <b>B · Departure Board</b> → the <i>Frequent</i> state (a scannable board when several trips are live); <b>C · Dream Stack</b> → the <i>Cold</i> state (possibilities fanned, “where to?” as the question). The home auto-tunes between them by the state of your travel life.</p>
                <p style={{ margin: 0, color: T.mute }}><b style={{ color: T.ink }}>Boundaries.</b> The <b>+ Create</b> here is the lightweight “begin a trip” modal — the full create-a-trip flow lives in <b>Vesper Onboarding</b>. Tapping a trip opens the <b>single-trip home</b> (Vesper Trip Home), whose facet tiles open the detail surfaces (Stay · Transport · Costs · Route) and the Itinerary.</p>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
