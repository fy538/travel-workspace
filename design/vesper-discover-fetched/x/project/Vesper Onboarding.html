<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>Vesper · Onboarding v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    html, body { margin: 0; padding: 0; background: #DAD3C5; font-family: 'DM Sans', system-ui, sans-serif; color: #1B1714; }
    *, *::before, *::after { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>
  <script type="text/babel" src="v3-shared.jsx"></script>
  <script type="text/babel" src="trips-shared.jsx"></script>
  <script type="text/babel" src="vesper-shared.jsx"></script>
  <script type="text/babel" src="onboarding-kit.jsx"></script>
  <script type="text/babel" src="gouache.jsx"></script>
  <script type="text/babel" src="onboarding-v2-core.jsx"></script>
  <script type="text/babel" src="onboarding-v2-flow.jsx"></script>
  <script type="text/babel" src="onboarding-v2-invite.jsx"></script>
  <script type="text/babel" src="onboarding-v2-seams.jsx"></script>

  <script type="text/babel">
    function Phn({ children }) {
      return <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'flex-start', height: '100%', paddingTop: 14 }}>{children}</div>;
    }
    const EB = ({ children }) => <div style={{ fontSize: 10.5, letterSpacing: 2, color: T.gold, fontWeight: 600 }}>{children}</div>;
    const H2 = ({ children }) => <h2 style={{ fontFamily: T.serif, fontWeight: 500, fontSize: 27, letterSpacing: -0.7, lineHeight: 1.05, color: T.ink, margin: '8px 0 14px' }}>{children}</h2>;
    function Note({ children }) { return <p style={{ margin: '0 0 11px', fontSize: 13.5, lineHeight: 1.55, color: T.inkSoft }}>{children}</p>; }
    function Spec({ children }) { return <div style={{ marginTop: 12, padding: 12, background: '#FBF7EC', borderRadius: 8, fontSize: 11.5, color: T.mute, lineHeight: 1.5 }}>{children}</div>; }
    function Logic({ eyebrow, title, children, w = 450 }) {
      return <div style={{ width: w, padding: '34px 26px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft }}><EB>{eyebrow}</EB><H2>{title}</H2><div style={{ borderTop: `0.5px solid ${T.hairline}`, paddingTop: 16 }}>{children}</div></div>;
    }
    const AB = (id, label, comp) => <DCArtboard id={id} label={label} width={433} height={904} bg="transparent"><Phn>{comp}</Phn></DCArtboard>;

    function App() {
      return (
        <DesignCanvas title="Vesper · Onboarding v2" subtitle="Lead with voice. The trip or the diary is the value — not a login. Vesper opens with a question, not an ask; photos are requested only at the gift, and sign-in only at 'keep it.' Value before the ask — no signup form, no 'Welcome to Vesper!'">

          {/* ═══ THE CORE ═══ */}
          <DCSection id="opening" title="The opening" subtitle="One screen. Not a logo splash and not an ask — Vesper introduces itself as a concierge with taste, and you Begin (returning users tap 'I already have an account'). The very next thing is the conversation, never a permission prompt.">
            {AB('o-cover', '1 · The opening (Vesper, with taste)', <V2Cover/>)}
            <DCArtboard id="o-notes" label="Opening logic" width={450} height={904} bg="transparent">
              <Logic eyebrow="LEAD WITH VOICE, NOT AN ASK" title="Meet Vesper before anything is asked of you.">
                <Note><b>Why this changed.</b> The old flow opened with a brand splash, then asked for your whole photo library on screen two — two asks before the app had shown what it is. Now the opening is the single brand moment, and the very next screen is the <i>interaction</i> (the fork), not a request.</Note>
                <Note><b>The cover does real work.</b> It says what Vesper is — “a travel concierge with taste” — and splits new (“Begin”) from returning (“I already have an account”). No form, no permission; auth is deferred to the very end.</Note>
                <Spec>The photo-diary is no longer the opener — it’s demoted to a <i>contextual gift</i>, offered once you’ve engaged (see “The handoff — the dreaming branch’s gift” below). The most intimate ask now comes with trust and context, not as the toll to enter.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ THE FIRST INTERACTION · FORK + BRANCHES ═══ */}
          <DCSection id="interaction" title="The first interaction · the fork + its branches" subtitle="The first thing you DO — Vesper's voice asks one generic question, no ask and no permission, so it reads identically for everyone. Then it routes: a trip in mind → a light capture (then sign in, into the trip's chat) · still dreaming → two quick taste beats (then the diary gift). The branch decides what comes next.">
            {AB('i-fork', '2 · The fork (generic Vesper voice)', <V2Fork/>)}
            {AB('i-cap-a', '3a · A trip in mind · where', <V2TripWhere/>)}
            {AB('i-cap-b', '3b · A trip in mind · when', <V2TripWhen/>)}
            {AB('i-cap-c', '3c · A trip in mind · who', <V2TripWho/>)}
            {AB('i-taste1', '4a · Dreaming · what you travel for', <V2TasteInterest/>)}
            {AB('i-taste2', '4b · Dreaming · your pace', <V2TastePace/>)}
            <DCArtboard id="i-notes" label="The interaction logic" width={450} height={904} bg="transparent">
              <Logic eyebrow="VOICE FIRST, NO ASK" title="The first move is a conversation.">
                <Note><b>The fork is a universal hinge.</b> Vesper’s voice is the hero — one big, <i>generic</i> question (“So — where are we going?”) with <b>no permission and no scan claim</b>, so it reads identically for everyone. There is <b>no photo ask here at all</b>; the diary comes later, in context.</Note>
                <Note><b>Branch · a trip in mind</b> — a light capture, not a forced chat: one fill-in-the-blank sentence completed across <b>three quick states</b> — <b>3a where</b> (a place search + the cities you keep circling), <b>3b when</b> (tap a duration), <b>3c who</b> (companions, where “a few of us” reveals an inline invite that seeds the shared trip). Mostly taps, with a quiet “Rather just tell me? Talk it through” escape — which opens the Vesper assistant (a separate surface), not a bespoke onboarding chat.</Note>
                <Note><b>Branch · still dreaming</b> — two quick, <i>orthogonal</i> taste beats (taps only, gouache-led): <b>4a interest</b> (food / art / nature / sea) and <b>4b pace</b> (slow-&-deep vs full-&-restless). Two axes — enough to locate a traveller without a quiz slog.</Note>
                <Spec>The axes seed the Atlas <b>Travel DNA</b>; comfort/edge, Social and Planning are learned later from real behaviour. Crucially, the user has now <i>engaged</i> — a trip in mind goes straight into the trip, while only a dreamer is offered the photo-diary next. Because they’ve engaged, that offer lands with trust, not as the cost of entry.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ THE DIARY · OFFERED AFTER YOU ENGAGE ═══ */}
          <DCSection id="handoff" title="The handoff · the dreaming branch's gift, then you're in" subtitle="The dreaming branch's ending — a trip in mind skips this entirely (its value is the trip). With no trip, the diary IS the first value, so Vesper offers it here as a gift, not a gate. 'Maybe later' → straight into Atlas, no diary. 'Build my diary' → the photo permission, then the sign-in screen where the diary constructs as you sign in — ready the moment you're in.">
            {AB('d-gift', '5 · The gift, offered (opt-in)', <V2Gift/>)}
            {AB('d-perm', '6 · Permission → then sign in', <V2Permission/>)}
            <DCArtboard id="h-notes" label="The handoff logic" width={450} height={904} bg="transparent">
              <Logic eyebrow="A GIFT, NOT A GATE" title="Onboarding ends; you land in the app.">
                <Note><b>The gift, offered — not demanded.</b> Only now, with context, does Vesper offer it: “one more thing — want a diary of your own?” It’s shown as a <b>locked preview</b> of what you’d get (not an empty box), with the privacy promise stated plainly.</Note>
                <Note><b>Both answers move forward.</b> <i>“Maybe later — take me in”</i> → straight into Atlas, no diary, no dead end. <i>“Build my diary”</i> → the photo permission fires, then the <b>sign-in screen, where the diary constructs as you sign in</b>. Either way, onboarding is nearly over.</Note>
                <Note><b>Sign-in comes next — while it builds.</b> Granting photos leads straight to the sign-in screen, which shows the diary developing in real time. Auth and developing are the <b>same beat</b> (deferred auth, but with the work visibly underway), so the diary is ready the moment you’re in. Returning users still sign in from the cover’s “I already have an account.”</Note>
                <Spec>Develop + sign-in are one screen (next section); after it, you’re simply in Atlas — no separate reveal or keep-it step.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ THE OPT-OUT · the gift's other answer ═══ */}
          <DCSection id="seams" title="The opt-out · declined the gift" subtitle="The gift's other answer, right where the decision happens. Tapping 'Maybe later' (or denying the iOS sheet) is graceful — no guilt, no diary, no dead end. Vesper reframes it warmly, you sign in (no diary — you still need an account to use Atlas), and you land in Atlas with the door open to build one later. (Full sequence in Path 3; the other answer — build it — develops in Path 2.)">
            {AB('seam-decline', 'The reframe — “we’ll build it as we go”', <SeamDecline/>)}
            {AB('seam-signin', 'Sign in (no diary)', <V2DeclineSignIn/>)}
            <DCArtboard id="seam-notes" label="The opt-out logic" width={450} height={904} bg="transparent">
              <Logic eyebrow="THE OPT-OUT" title="“No” is a graceful answer too.">
                <Note><b>Declined / maybe-later.</b> Tapping “Maybe later” on the gift, or denying the iOS sheet, is graceful — no guilt, no dead end. Vesper reframes it (“we’ll build it as we go”), then a <b>no-diary sign-in</b> — you still make an account to use Atlas, just without the photo hook — and you land in Atlas, no diary. The door stays open (“let Vesper look later”).</Note>
                <Note><b>Why the forming diary isn’t a separate branch.</b> A thin photo library isn’t an opt-out — it’s just a quieter version of <i>granting</i>. So it flows through the same <b>sign-in-while-it-constructs</b> screen as a rich library, just with a blank page seeded by taste (see the forming face in Path 2).</Note>
                <Spec>After the gift there are exactly two answers: <b>build it</b> → sign in while it constructs (rich or forming) → you’re in · <b>maybe later / deny</b> → a no-diary sign-in → land in Atlas, no diary.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ AFTER SIGN-IN · IN ATLAS ═══ */}
          <DCSection id="atlasdiary" title="After sign-in · in Atlas" subtitle="You signed in while the diary constructed (Path 2, screen 7), so you arrive already signed in. If the scan's still finishing, it completes quietly in the background; the email sign-in path (from that screen's 'Continue with email') lives here too; then it's simply your diary, kept.">
            {AB('a-cook', 'Atlas · diary finishing in the background', <AtlasDeveloping done={false}/>)}
            {AB('seam-email', 'Sign in · email path', <SeamEmail/>)}
            {AB('seam-code', 'Email → six-digit code', <SeamCode/>)}
            {AB('a-home', 'Atlas · home, diary kept', <V2Land/>)}
            <DCArtboard id="a-notes" label="The Atlas-diary logic" width={450} height={904} bg="transparent">
              <Logic eyebrow="DIARY + SIGN-IN ARE ONE BEAT" title="Sign in while it builds; then you're just in.">
                <Note><b>Construction IS the sign-in screen.</b> No takeover, no “Keep my diary” button mid-scan. Right after permission, the sign-in screen (Path 2 · 7) shows the diary filling in while Vesper narrates (“Lisbon, twice. Tokyo one winter… developing the rest”) — the auth pills sit right below it. You sign in <i>while</i> it works.</Note>
                <Note><b>Arrive already signed in.</b> Because auth happened during construction, you land in Atlas with nothing left to do. If the scan hasn’t finished, it completes <b>in the background</b> — a quiet “still reading your library” line, the app fully usable (profile · search · ＋ present).</Note>
                <Note><b>The email path.</b> On the sign-in screen, Apple / Google are one tap; “Continue with email” expands to an email field (“I’ll send a six-digit code, no passwords”) then the six-digit code screen — converging right back into the kept-diary home. Shown here as the two email tiles.</Note>
                <Note><b>Then it’s just Atlas.</b> The diary kept, the home warm (simplified here; the real Atlas home lives in its own surface). A trip in mind lands in the existing single-trip home instead.</Note>
                <Spec>No separate develop → reveal → keep-it → sign-in sequence — developing and signing in are <b>one screen</b>; everything after is simply Atlas.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ INVITE FLOW ═══ */}
          <DCSection id="invite" title="A different door · joining a friend's invite" subtitle="The strongest entry point: you arrive via a Vesper user's invite, so value is already here — a real trip, real dates, a friend who vouched. The trip is the hook; the photo-diary gift becomes a delightful secondary, offered only once you're in. No fork, no taste beats — this IS the trip.">
            {AB('inv-invite', '1 · The invite (hook + read-only peek, one screen)', <InvInvite/>)}
            {AB('inv-auth', '2 · Auth (framed as joining)', <InvAuth/>)}
            {AB('inv-gift', '3 · The gift, deferred (private, opt-in)', <InvGift/>)}
            <DCArtboard id="inv-notes" label="Invite logic" width={450} height={904} bg="transparent">
              <Logic eyebrow="INVITE · VALUE ALREADY HERE" title="The trip is the hook.">
                <Note><b>Why it inverts cold-start.</b> Cold-start has to manufacture first value (the diary gift). An invite <i>arrives</i> with it — a populated, social, real trip + a friend who vouched. The emptiness problem is solved before the first tap.</Note>
                <Note><b>1 · Invite = hook + peek, one screen.</b> The place, dates, group and Ana’s note up top; a <i>read-only</i> glance at the shape so far (the days, the open Saturday) right below — proof before the ask. An escape hatch — <i>“Not now — just set up Vesper for me”</i> — lets you create an account <b>without</b> committing to the trip.</Note>
                <Note><b>2 · Auth → the real trip home.</b> Auth is framed as <i>“join Lisbon,”</i> at peak intent. You then land straight in the <b>existing shared-trip home</b> (designed in Vesper Trip Home) — no bespoke onboarding landing to reinvent. Vesper greets you in-context there.</Note>
                <Note><b>3 · The gift, deferred.</b> Only once you’re settled: a quiet, private, opt-in nudge to build your own photo diary — converting a “joined for a friend” user into a real Vesper user with their own Atlas. Never during the join.</Note>
                <Note><b>Existing Vesper user — same screen 1.</b> An already-signed-in user opens the very same invite screen (from a push / deep link); the only difference is they <b>skip auth</b> and land straight in the trip. New user → 1→2→home; existing user → 1→home.</Note>
                <Spec>Dropped vs cold-start: the fork, the taste beats (this IS the trip). Kept: deferred auth, the diary gift (demoted to secondary), the privacy spine. The landing is the real Trips surface, not a mock.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ THE RETURNING DOOR ═══ */}
          <DCSection id="returning" title="The returning door · existing users" subtitle="Not a seam of this flow — a separate front door. Returning users never enter onboarding; from the cover's 'I already have an account,' a calm sign-in lands them straight in their app.">
            {AB('seam-return', 'Welcome back · returning sign-in → straight to app', <SeamReturn/>)}
            <DCArtboard id="return-notes" label="Returning door logic" width={450} height={904} bg="transparent">
              <Logic eyebrow="THE RETURNING DOOR" title="Skip everything; you're already known.">
                <Note><b>A separate entrance, not a branch.</b> A returning user taps <i>“I already have an account”</i> on the cover and bypasses the entire gift-first pipeline — no fork, no taste, no reveal, no deferred-auth dance.</Note>
                <Note><b>Calm and recognising.</b> “Everywhere you’ve been is still here” — sign in (Apple / Google / email) and land straight in their app, diary and trips intact.</Note>
                <Spec>Why it’s pulled out: it shares the auth providers but none of the onboarding spine. Grouping it with the branches above implied it was an edge of <i>this</i> flow — it isn’t.</Spec>
              </Logic>
            </DCArtboard>
          </DCSection>

          {/* ═══ EVERY PATH · AS SCREENS ═══ */}
          <DCSection id="path-trip" title="Path 1 · A trip in mind → straight into the chat" subtitle="The trip is the value, so this path never detours through the photo-diary gift. Cover → fork → the three-part capture (where/when/who) → Start the trip → SIGN IN to open it (auth at peak intent, the trip already built) → land straight in the trip's Vesper chat, planning together. The photo-diary is offered later as a quiet, opt-in notification — never a full screen here. Read left to right.">
            {AB('p1-cover', '1 · Cover', <V2Cover/>)}
            {AB('p1-fork', '2 · Fork', <V2Fork/>)}
            {AB('p1-3a', '3a · Where', <V2TripWhere/>)}
            {AB('p1-3b', '3b · When', <V2TripWhen/>)}
            {AB('p1-3c', '3c · Who → Start the trip', <V2TripWho/>)}
            {AB('p1-auth', '4 · Sign in to open the trip', <V2TripSignIn/>)}
            {AB('p1-chat', '5 · In the trip · Vesper chat', <V2TripChat/>)}
            {AB('p1-notif', '6 · Later · the diary, offered as a notification (opt-in)', <V2TripChat notif={true}/>)}
          </DCSection>

          <DCSection id="path-dream" title="Path 2 · Still dreaming → your diary → Atlas" subtitle="No trip yet, so the diary IS the first value. Cover → fork → two taste beats → the gift, accepted → permission → sign in WHILE the diary constructs (auth and developing are the same beat, so it's ready the moment you're in) → you land in Atlas (see 'After sign-in · in Atlas'). The sign-in screen has two faces — rich (has photo history) vs forming (blank page, thin library).">
            {AB('p2-cover', '1 · Cover', <V2Cover/>)}
            {AB('p2-fork', '2 · Fork', <V2Fork/>)}
            {AB('p2-4a', '4a · Interest', <V2TasteInterest/>)}
            {AB('p2-4b', '4b · Pace', <V2TastePace/>)}
            {AB('p2-gift', '5 · The gift (accept)', <V2Gift/>)}
            {AB('p2-perm', '6 · Permission', <V2Permission/>)}
            {AB('p2-auth-rich', '7a · Sign in · while the diary constructs', <V2Save/>)}
            {AB('p2-auth-form', '7b · Sign in · while a fresh page starts', <V2Save forming={true}/>)}
          </DCSection>

          <DCSection id="path-decline" title="Path 3 · Declined the gift → sign in → Atlas" subtitle="The opt-out that still lands — and still signs in. Two ways to decline: tap 'Maybe later' at the gift (5), OR tap 'Build my diary' and then deny the iOS permission sheet (6). Either way → a graceful, no-diary sign-in (7) — you still make an account to use Atlas, just without the photo hook — then you land in Atlas with no diary yet (8). The door to build one stays open.">
            {AB('p3-cover', '1 · Cover', <V2Cover/>)}
            {AB('p3-fork', '2 · Fork', <V2Fork/>)}
            {AB('p3-4a', '4a · Interest', <V2TasteInterest/>)}
            {AB('p3-4b', '4b · Pace', <V2TastePace/>)}
            {AB('p3-gift', '5 · The gift — “Maybe later” (decline)', <V2Gift/>)}
            {AB('p3-perm', '6 · …or grant, then deny the iOS sheet', <V2Permission/>)}
            {AB('p3-signin', '7 · Sign in (no diary)', <V2DeclineSignIn/>)}
            {AB('p3-land', '8 · Land (Atlas · no diary yet)', <V2Land noDiary={true}/>)}
          </DCSection>

          <DCSection id="path-invite" title="Path 4 · Invite → joining a friend" subtitle="A different door entirely — value is already here. The invite peek (real trip + a friend who vouched) → auth framed as 'join Lisbon' → straight into the shared trip; the diary gift is offered later, opt-in. (Existing user: skip auth.)">
            {AB('p5-inv', '1 · The invite (peek)', <InvInvite/>)}
            {AB('p5-auth', '2 · Auth · join Lisbon', <InvAuth/>)}
            {AB('p5-gift', '3 · The gift, later', <InvGift/>)}
          </DCSection>

          <DCSection id="path-return" title="Path 5 · Returning → back into your app" subtitle="Already known. From the cover's 'I already have an account,' a calm welcome-back sign-in lands them straight in their app — no fork, no taste, no gift.">
            {AB('p6-cover', '1 · Cover', <V2Cover/>)}
            {AB('p6-ret', '2 · Welcome back', <SeamReturn/>)}
            {AB('p6-land', '3 · Straight into the app', <V2Land/>)}
          </DCSection>

          <DCSection id="path-email" title="Auth · the email path (inside any sign-in step)" subtitle="The sub-branch any signed-out path can take at the auth moment: instead of Apple/Google, 'Continue with email' → an email field → a six-digit code → back into the app. Shown once here; it slots into the sign-in step on Paths 1–3 (and the invite & returning doors).">
            {AB('pe-save', '1 · A sign-in screen (e.g. Path 2)', <V2Save/>)}
            {AB('pe-email', '2 · Email entry', <SeamEmail/>)}
            {AB('pe-code', '3 · Six-digit code', <SeamCode/>)}
            {AB('pe-land', '4 · Land', <V2Land/>)}
          </DCSection>

          {/* ═══ THE PIPELINE ═══ */}
          <DCSection id="pipeline" title="The pipeline" subtitle="">
            <DCArtboard id="pipe-paths" label="Every path · the full route map" width={1060} height={760} bg="transparent">
              <PipelinePaths/>
            </DCArtboard>
            <DCArtboard id="pipe" label="The principles" width={900} height={520} bg="transparent">
              <div style={{ width: 900, padding: '36px 34px', background: '#F1ECE2', borderRadius: 8, color: T.inkSoft }}>
                <EB>THE PRINCIPLES</EB>
                <H2>Lead with voice. The trip or the diary is the value. Ask last.</H2>
                <div style={{ padding: '13px 16px', background: '#FBF7EC', borderRadius: 9, border: `0.5px solid ${T.hairline}`, margin: '10px 0 20px' }}>
                  <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: 1.4, color: T.goldDeep, fontWeight: 700, marginBottom: 7 }}>THE MODEL</div>
                  <div style={{ fontFamily: T.serif, fontSize: 15, color: T.ink, lineHeight: 1.55 }}>
                    Cover → Fork (<i>voice first — no ask, no scan claim</i>) → <b>branch</b>. A trip in mind → <i>Start the trip → sign in to open it → the trip’s Vesper chat</i> (the diary offered later, as a notification). Still dreaming → <i>the diary gift → sign in while it constructs → Atlas</i>. Photos are asked only at the gift; auth comes right after — when there’s a trip to open or a diary to keep.
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 22, borderTop: `0.5px solid ${T.hairline}`, paddingTop: 18 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: 1.8, color: T.goldDeep, fontWeight: 700, marginBottom: 10 }}>WHY IT WORKS</div>
                    {[
                      ['Value before the ask.', 'the trip is built or the diary develops before any sign-in — deferred auth lifts activation 10–30%.'],
                      ['Voice first, no toll.', 'the screen after the cover is a conversation, never a permission prompt; photos come later, in context.'],
                      ['The branch fits the intent.', 'a trip in mind goes straight to the trip; only a dreamer is handed the diary as the first gift.'],
                      ['The gift returns.', 'for trip-builders the diary is a later, opt-in nudge — a finished diary waiting in Atlas is a day-1 hook.'],
                    ].map(([b, s]) => (
                      <div key={b} style={{ marginBottom: 9 }}>
                        <span style={{ fontFamily: T.serif, fontSize: 15, color: T.ink, fontWeight: 500 }}>{b} </span>
                        <span style={{ fontFamily: T.serif, fontStyle: 'italic', fontSize: 13.5, color: T.mute }}>{s}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: 1.8, color: '#A04030', fontWeight: 700, marginBottom: 10 }}>WHAT IT NEVER DOES</div>
                    {['“Welcome to Vesper!” / feature tour', 'A permission prompt on screen one', 'A photo ask before you’ve engaged', 'Account creation before value', 'A decorative quiz that changes nothing', 'Confetti / progress meters / streaks'].map((x) => (
                      <div key={x} style={{ display: 'flex', alignItems: 'baseline', gap: 9, marginBottom: 8 }}>
                        <span style={{ color: '#A04030', fontSize: 13, flexShrink: 0 }}>✗</span>
                        <span style={{ fontFamily: T.serif, fontSize: 14, color: T.inkSoft, lineHeight: 1.3 }}>{x}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
