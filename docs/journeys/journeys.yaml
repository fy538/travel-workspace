# Canonical journey registry — the SINGLE SOURCE OF TRUTH for the journey set.
#
# Every other journey registry is checked against this list by
# scripts/check_journey_registry.py (no DB, runs in CI):
#   - docs/journeys/<doc>            (one-pager per journey)
#   - README.md                      (index table)
#   - travel-agent .../dogfood_journey_persona_cert.py  (lived persona-cert specs)
# And scripts/sync_journey_status.py generates the STATUS.md fidelity Matrix
# from this list + derived per-fidelity coverage.
#
# Adding a journey = add it HERE first, then the guard tells you which
# registries still need it. tier: golden-path (J01–J12, the lifecycle spine)
# vs holistic-extension (J13–J19, the dimensions the spine misses).

