# Feature-flag registry — canonical owner/expiry source for both repos.
#
# Why this exists: as of 2026-07-06, 26 flags across travel-agent and
# travel-app had zero owner or expiration metadata anywhere in the code.
# Untracked flags are exactly how "shipped dark for now" becomes permanent
# debt (see docs/working/ research notes on flag-lifecycle management).
# This file is the single source of truth; scripts/check_flag_registry.py
# enforces it at pre-push (see workspace .pre-commit-config.yaml).
#
# Fields:
#   name      - env var / const name as it appears in code
#   repo      - travel-agent | travel-app
#   location  - file:line or symbol where the flag is defined
#   default   - the flag's default value today
#   category  - release   = a feature rollout, expected to go away once shipped
#               experiment = a trial/eval gate, expected to resolve one way or another
#               ops        = a permanent operational kill-switch/toggle, not a
#                            feature rollout — `expires` reads as "review by",
#                            not "must remove by"
#   owner     - accountable person (fy538 for all, per 2026-07-06 decision)
#   expires   - review/removal-by date. Fixed 90-day convention from creation
#               of this registry (2026-07-06 -> 2026-10-04) for every flag,
#               applied uniformly per instruction; category above tells you
#               how to *read* a blown date, not whether the check fires.
#   status    - active | resolved. check_flag_registry.py only fails on
#               `active` entries whose `expires` has passed. Once a flag is
#               actually removed or permanently flipped, set status: resolved
#               rather than deleting the row (keeps a historical record).
#   notes     - short context, e.g. what has to happen before flip/removal

