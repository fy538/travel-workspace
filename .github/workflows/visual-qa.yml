name: Visual QA (Maestro PR smoke)

# Tier-3 device execution for the deterministic ten-flow PR-smoke lane. The
# release simulator build embeds JavaScript, so this lane does not depend on a
# Metro process or a development client.

on:
  workflow_dispatch:
  schedule:
    # 07:00 UTC nightly (after most of a day's merges have landed on main).
    - cron: "0 7 * * *"

concurrency:
  group: visual-qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  maestro-pr-smoke:
    name: Maestro PR smoke (iOS simulator)
    runs-on: macos-15
    timeout-minutes: 60
    env:
      MAESTRO_VERSION: 2.6.1
      MAESTRO_TEST_SUITE_NAME: visual-qa-pr-smoke
    steps:
      - name: Check out workspace
        uses: actions/checkout@v6

      - name: Resolve child repo refs
        id: child_refs
        run: |
          LOCK="${GITHUB_WORKSPACE}/docs/child-repos.ci-lock.json"
          APP_REF=main
          if [ -f "$LOCK" ]; then
            APP_REF=$(python3 -c "import json; print(json.load(open('$LOCK')).get('travel-app') or 'main')")
          fi
          echo "app_ref=$APP_REF" >> "$GITHUB_OUTPUT"
          echo "Child repo pin: travel-app@$APP_REF"

      - name: Check out Travel App
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/travel-app
          path: travel-app
          ref: ${{ steps.child_refs.outputs.app_ref }}
          token: ${{ secrets.TRAVEL_WORKSPACE_CI_TOKEN || github.token }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: travel-app/package-lock.json

      - name: Set up Java (Maestro JVM)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: travel-app

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS simulator
        run: |
          # Pick the first available iPhone simulator and boot it.
          UDID=$(xcrun simctl list devices available | grep -Eo '\(([0-9A-F-]{36})\)' | head -1 | tr -d '()')
          if [ -z "$UDID" ]; then echo "::error::No iOS simulator available"; exit 1; fi
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Build + install app on simulator (mock mode)
        env:
          EXPO_PUBLIC_USE_MOCK_API: "true"
          EXPO_PUBLIC_SKIP_AUTH: "true"
          EXPO_PUBLIC_IS_INTERNAL_BUILD: "true"
          EXPO_PUBLIC_APP_CHANNEL: e2e
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: npx expo run:ios --configuration Release --device "$SIM_UDID" --no-bundler
        working-directory: travel-app

      - name: Run PR-smoke Maestro flows
        run: make certify-visual

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-visual-qa-${{ github.run_id }}
          path: |
            travel-app/build/maestro/**
            ~/.maestro/tests/**
          retention-days: 14
          if-no-files-found: ignore
