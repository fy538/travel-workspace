name: Reliability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types:
      - travel-agent-ci-success
      - travel-app-ci-success

concurrency:
  group: reliability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract-and-golden-path:
    name: Contract and golden paths
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Show cross-repo trigger
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Triggered by: ${{ github.event.action }}"
          echo "Source repo: ${{ github.event.client_payload.source_repo }}"
          echo "Source SHA: ${{ github.event.client_payload.source_sha }}"
          echo "Source run: ${{ github.event.client_payload.source_run_id }}"

      - name: Check out workspace
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve child repo refs
        id: child_refs
        run: |
          LOCK="${GITHUB_WORKSPACE}/docs/child-repos.ci-lock.json"
          AGENT_REF=main
          APP_REF=main
          if [ -f "$LOCK" ]; then
            AGENT_REF=$(python3 -c "import json; print(json.load(open('$LOCK')).get('travel-agent') or 'main')")
            APP_REF=$(python3 -c "import json; print(json.load(open('$LOCK')).get('travel-app') or 'main')")
          fi
          echo "agent_ref=$AGENT_REF" >> "$GITHUB_OUTPUT"
          echo "app_ref=$APP_REF" >> "$GITHUB_OUTPUT"
          echo "Child repo pins: travel-agent@$AGENT_REF travel-app@$APP_REF"

      - name: Check out Travel Agent
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/travel-agent
          path: travel-agent
          ref: ${{ steps.child_refs.outputs.agent_ref }}
          token: ${{ secrets.TRAVEL_WORKSPACE_CI_TOKEN || github.token }}
          fetch-depth: 0

      - name: Check out Travel App
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/travel-app
          path: travel-app
          ref: ${{ steps.child_refs.outputs.app_ref }}
          token: ${{ secrets.TRAVEL_WORKSPACE_CI_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: travel-agent/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt
        working-directory: travel-agent

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: travel-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: travel-app

      - name: OpenAPI snapshot freshness
        # Regenerate the snapshot offline from the backend models and fail
        # if it differs from the committed docs/openapi.json. Catches the
        # drift that silently broke frontend types on 2026-05-19: backend
        # models changed (expense category enum, new schemas) but the
        # committed snapshot was never regenerated. Pairs with the
        # contract check below (schema.gen.ts vs snapshot) for full
        # backend → snapshot → types coverage.
        run: |
          PYTHONPATH=. python scripts/export_openapi.py --out /tmp/openapi.fresh.json
          if ! diff -q "$GITHUB_WORKSPACE/docs/openapi.json" /tmp/openapi.fresh.json > /dev/null; then
            echo "::error::docs/openapi.json is stale vs the backend models."
            echo "Run ./scripts/sync-types.sh and commit docs/openapi.json + schema.gen.ts together."
            diff "$GITHUB_WORKSPACE/docs/openapi.json" /tmp/openapi.fresh.json | head -60 || true
            exit 1
          fi
          echo "✓ OpenAPI snapshot matches the backend models"
        working-directory: travel-agent

      - name: Contract check
        run: make contract-check

      - name: Journey mock-walk (tier 1)
        run: npm test -- __tests__/journeys/ --runInBand
        working-directory: travel-app

      - name: Maestro flow validation
        # Offline visual-gate guard: every .maestro flow parses + every flow
        # referenced by a package.json visual-qa* script exists. The full
        # Maestro run needs a macOS runner + simulator (see visual-qa.yml,
        # nightly/dispatch), so this cheap check is the PR-blocking foothold
        # that stops a renamed/deleted flow from silently breaking the wedge
        # visual gate (certify-visual / visual-qa:wedge).
        run: make maestro-flow-check

      - name: Journey-list drift guard
        # Pure file-glob (no DB): fails if scenarios.mjs and tests/scenarios/
        # test_j*.py have drifted, so a new BE journey can't silently fall out
        # of the qa:logic runner. Both child repos are checked out as siblings,
        # so the runner resolves ../travel-agent.
        run: npm run qa:logic:check-drift
        working-directory: travel-app

      - name: Journey-set registry guard
        # Pure file-parse (no DB): journeys.yaml ↔ docs ↔ README ↔ persona-cert
        # must agree on the journey SET, so a journey added to one definition
        # registry but forgotten in another fails CI. Reports (non-fatally) the
        # contract/logic fidelity gap for the holistic-extension journeys.
        run: make journey-registry-check

      - name: Flag registry guard
        # Pure file-parse (no DB): fails if any `active` flag in
        # docs/flags/registry.yaml is past its review/removal date. This is
        # the enforcement floor for flag hygiene — the local pre-commit hook
        # (workspace .pre-commit-config.yaml, pre-push stage) catches this
        # first, but a skipped hook or an un-configured clone must not let a
        # stale dark flag go unnoticed indefinitely.
        run: make flag-registry-check

      - name: New-document governance guard
        # Phase 1 is intentionally non-retroactive: only Markdown files added
        # by this workspace change need lifecycle metadata. Existing docs and
        # edits to existing docs remain grandfathered until classification.
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          BASE_SHA="${PR_BASE_SHA:-$PUSH_BASE_SHA}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="HEAD^"
          fi
          python3 scripts/check_doc_governance.py --new-since "$BASE_SHA"

      - name: Documentation inventory coverage
        # Phase 2 gate: a new file may carry valid metadata but it must also
        # receive an explicit disposition in the living inventory.
        run: make docs-inventory-check

      - name: Canonical documentation spine and current-state drift
        # Phase 3: navigation is bounded to eight entry points and the
        # current-state summary is derived from committed registries.
        run: make docs-spine-check docs-status-check docs-links-check docs-child-governance-check

      - name: API coverage check
        # Verifies every URL the frontend calls in http.ts exists in
        # docs/openapi.json at the declared method. Catches stale
        # snapshots and 404-at-runtime drift before they ship.
        run: make api-coverage-check

      - name: Golden path QA
        run: make golden-path-qa

      - name: Reliability gate
        run: make reliability-gate

      - name: Write reliability report
        if: always()
        run: make reliability-report > reliability-report.txt

      - name: Upload reliability report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reliability-report-${{ github.run_id }}
          path: reliability-report.txt
          retention-days: 14
