name: Reliability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types:
      - travel-agent-ci-success
      - travel-app-ci-success

concurrency:
  group: reliability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract-and-golden-path:
    name: Contract and golden paths
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Show cross-repo trigger
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "Triggered by: ${{ github.event.action }}"
          echo "Source repo: ${{ github.event.client_payload.source_repo }}"
          echo "Source SHA: ${{ github.event.client_payload.source_sha }}"
          echo "Source run: ${{ github.event.client_payload.source_run_id }}"

      - name: Check out workspace
        uses: actions/checkout@v6

      - name: Check out Travel Agent
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/travel-agent
          path: Travel Agent
          token: ${{ secrets.TRAVEL_WORKSPACE_CI_TOKEN || github.token }}

      - name: Check out Travel App
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/travel-app
          path: Travel App
          token: ${{ secrets.TRAVEL_WORKSPACE_CI_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: Travel Agent/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt
        working-directory: Travel Agent

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Travel App/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Travel App

      - name: OpenAPI snapshot freshness
        # Regenerate the snapshot offline from the backend models and fail
        # if it differs from the committed docs/openapi.json. Catches the
        # drift that silently broke frontend types on 2026-05-19: backend
        # models changed (expense category enum, new schemas) but the
        # committed snapshot was never regenerated. Pairs with the
        # contract check below (schema.gen.ts vs snapshot) for full
        # backend → snapshot → types coverage.
        run: |
          PYTHONPATH=. python scripts/export_openapi.py --out /tmp/openapi.fresh.json
          if ! diff -q "$GITHUB_WORKSPACE/docs/openapi.json" /tmp/openapi.fresh.json > /dev/null; then
            echo "::error::docs/openapi.json is stale vs the backend models."
            echo "Run ./scripts/sync-types.sh and commit docs/openapi.json + schema.gen.ts together."
            diff "$GITHUB_WORKSPACE/docs/openapi.json" /tmp/openapi.fresh.json | head -60 || true
            exit 1
          fi
          echo "✓ OpenAPI snapshot matches the backend models"
        working-directory: Travel Agent

      - name: Contract check
        run: make contract-check

      - name: Journey mock-walk (tier 1)
        run: npm test -- __tests__/journeys/ --runInBand
        working-directory: Travel App

      - name: API coverage check
        # Verifies every URL the frontend calls in http.ts exists in
        # docs/openapi.json at the declared method. Catches stale
        # snapshots and 404-at-runtime drift before they ship.
        run: make api-coverage-check

      - name: Golden path QA
        run: make golden-path-qa

      - name: Reliability gate
        run: make reliability-gate

      - name: Write reliability report
        if: always()
        run: make reliability-report > reliability-report.txt

      - name: Upload reliability report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reliability-report-${{ github.run_id }}
          path: reliability-report.txt
          retention-days: 14
